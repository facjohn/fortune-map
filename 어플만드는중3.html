<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>운명지도</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
/* ═══════════ THEME ═══════════ */
:root {
  --pri:#6B4EFF; --pri-g:rgba(107,78,255,0.25); --saju:#E85D3A; --sinjeom:#2DB67D; --tarot:#3B82F6; --gwan:#F59E0B;
  --bg:#FFFFFF; --bg2:#F8FAFC; --bg3:#F1F5F9; --surf:#FFFFFF;
  --tx:#0F172A; --tx2:#475569; --sub:#64748B; --mu:#94A3B8;
  --bd:#F1F5F9; --bd2:#E2E8F0; --red:#EF4444; --gold:#FACC15;
  --sh:0 2px 8px rgba(0,0,0,0.06); --overlay:rgba(0,0,0,0.5);
}
[data-theme="dark"] {
  --pri:#9B85FF; --pri-g:rgba(155,133,255,0.35);
  --bg:#0A0D1C; --bg2:#0F1328; --bg3:#171C38; --surf:#111530;
  --tx:#E4E2F0; --tx2:#A09CC0; --sub:#706C98; --mu:#504C78;
  --bd:#1A1F3A; --bd2:#252B50; --sh:0 2px 12px rgba(0,0,0,0.4); --overlay:rgba(4,4,16,0.88);
}
[data-theme="dark"] .leaflet-tile-pane{filter:brightness(0.6) contrast(1.15) saturate(0.7) hue-rotate(210deg);}
[data-theme="dark"] .leaflet-control-zoom a{background:var(--bg3)!important;color:var(--tx)!important;border-color:var(--bd2)!important;}

/* ═══════════ RESET ═══════════ */
*{box-sizing:border-box;margin:0;padding:0;font-family:'Pretendard',-apple-system,BlinkMacSystemFont,sans-serif;}
html,body{height:100%;width:100%;overflow:hidden;background:#0A0D1C;}
body{display:flex;justify-content:center;}
::-webkit-scrollbar{width:0;height:0;}

/* ═══════════ APP SHELL ═══════════ */
#app{display:flex;flex-direction:column;height:100vh;height:100dvh;width:100%;max-width:480px;background:var(--bg);position:relative;box-shadow:0 0 40px rgba(0,0,0,0.2);overflow:hidden;transition:background .35s;}

/* Header */
.hd{height:48px;min-height:48px;padding:0 16px;background:var(--surf);display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--bd);z-index:100;transition:all .35s;}
.hd-logo{font-size:20px;}
.hd-title{font-size:17px;font-weight:800;background:linear-gradient(135deg,var(--pri),#E85D3A);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.hd-user{font-size:10px;color:var(--pri);font-weight:600;margin-left:auto;}
.theme-btn{background:none;border:none;font-size:18px;cursor:pointer;padding:6px;border-radius:8px;transition:.2s;line-height:1;}
.theme-btn:active{transform:scale(0.9);}

/* Bottom Nav */
.bnav{height:56px;min-height:56px;background:var(--surf);border-top:1px solid var(--bd);display:flex;justify-content:space-around;align-items:center;z-index:100;transition:all .35s;}
.nv{display:flex;flex-direction:column;align-items:center;gap:1px;color:var(--sub);font-size:9px;font-weight:500;cursor:pointer;background:none;border:none;position:relative;transition:color .2s;padding:4px 12px;}
.nv.on{color:var(--pri);font-weight:700;}
.nv-ic{font-size:18px;}
.nv-badge{position:absolute;top:0;right:4px;background:var(--red);color:#fff;font-size:7px;font-weight:700;min-width:13px;height:13px;border-radius:7px;display:flex;align-items:center;justify-content:center;padding:0 3px;}

/* Main Content Area */
.content{flex:1 1 0;min-height:0;position:relative;overflow:hidden;}
.vw{position:absolute;inset:0;display:none;flex-direction:column;overflow:hidden;}
.vw.on{display:flex;}

/* ═══════════ MAP VIEW ═══════════ */
.filters{background:var(--surf);border-bottom:1px solid var(--bd);flex-shrink:0;transition:all .35s;}
.frow{display:flex;gap:5px;padding:6px 10px 2px;overflow-x:auto;white-space:nowrap;}
.frow:last-child{padding-bottom:6px;}
.fb{padding:5px 12px;border-radius:18px;border:none;font-size:10px;font-weight:600;cursor:pointer;background:var(--bg3);color:var(--sub);transition:all .15s;flex-shrink:0;}
.fb.on{color:#fff;}
.rb,.pb{padding:4px 9px;border-radius:7px;border:1px solid var(--bd2);background:var(--surf);color:var(--sub);font-size:9px;font-weight:600;cursor:pointer;flex-shrink:0;transition:all .15s;}
.rb.on{background:var(--tx);color:var(--bg);border-color:var(--tx);}
.pb.on{background:var(--pri);color:#fff;border-color:var(--pri);}

/* ★★★ MAP CONTAINER - THE FIX ★★★ */
.map-area{flex:1 1 0;min-height:0;position:relative;}
#map{position:absolute;top:0;left:0;width:100%;height:100%;}
.map-badge{position:absolute;top:8px;left:8px;background:var(--surf);border-radius:8px;padding:6px 10px;box-shadow:var(--sh);z-index:500;font-size:11px;font-weight:700;color:var(--tx);pointer-events:none;border:1px solid var(--bd);transition:all .35s;}

/* Popup */
.leaflet-popup-content-wrapper{border-radius:12px!important;padding:0!important;box-shadow:0 4px 20px rgba(0,0,0,0.15)!important;border:1px solid var(--bd2)!important;background:var(--surf)!important;}
.leaflet-popup-content{margin:0!important;width:auto!important;min-width:220px;max-width:270px;}
.leaflet-popup-tip{display:none;}
.custom-marker{border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 12px rgba(0,0,0,0.3);border:2.5px solid #fff;cursor:pointer;transition:transform .2s;}
.custom-marker:hover{transform:scale(1.15);}

/* ═══════════ SEARCH ═══════════ */
.s-wrap{padding:12px;background:var(--surf);border-bottom:1px solid var(--bd);flex-shrink:0;transition:all .35s;}
.s-in{width:100%;padding:10px 14px;border:2px solid var(--pri);border-radius:10px;font-size:13px;font-weight:600;outline:none;background:var(--bg2);color:var(--tx);transition:all .35s;}
.s-tag{padding:5px 11px;background:var(--bg2);border:1px solid var(--bd);border-radius:18px;font-size:11px;cursor:pointer;display:inline-block;margin:0 4px 6px 0;color:var(--tx);transition:all .2s;}
.s-tag:active{background:var(--pri);color:#fff;}
.si{padding:11px 14px;border-bottom:1px solid var(--bd);cursor:pointer;display:flex;align-items:center;gap:10px;transition:background .15s;}
.si:active{background:var(--bg2);}
.si-ic{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}

/* ═══════════ BADGES ═══════════ */
.v-badge{display:inline-flex;align-items:center;gap:2px;font-size:9px;font-weight:700;color:#059669;background:#ECFDF5;padding:2px 7px;border-radius:8px;white-space:nowrap;}
[data-theme="dark"] .v-badge{background:#0D2818;color:#34D399;}
.rv-badge{display:inline-flex;align-items:center;gap:2px;font-size:8px;font-weight:700;color:var(--pri);background:#EDE9FE;padding:2px 6px;border-radius:6px;}
[data-theme="dark"] .rv-badge{background:#1A1540;color:#A78BFA;}

/* ═══════════ CARDS ═══════════ */
.wcard{margin:0 12px 8px;background:var(--surf);border-radius:12px;padding:12px;border:1px solid var(--bd);display:flex;align-items:center;gap:10px;cursor:pointer;transition:all .35s;}
.rcard{background:var(--surf);border-radius:12px;padding:14px;margin:0 12px 8px;border:1px solid var(--bd);transition:all .35s;}
.pcard{margin:0 12px 8px;background:var(--surf);border-radius:10px;padding:12px;border:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center;transition:all .35s;}
.rstatus{padding:2px 8px;border-radius:5px;font-size:9px;font-weight:700;}
.rstatus.active{background:#EFF6FF;color:var(--pri);}[data-theme="dark"] .rstatus.active{background:#151A40;}
.rstatus.completed{background:var(--bg3);color:var(--sub);}
.rstatus.cancelled{background:#FEF2F2;color:var(--red);}[data-theme="dark"] .rstatus.cancelled{background:#200F15;}

/* ═══════════ SOCIAL LOGIN ═══════════ */
.sbtn{width:100%;max-width:300px;padding:13px;border-radius:10px;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:8px;cursor:pointer;border:none;transition:.15s;}
.sbtn:active{transform:scale(0.97);}
.sn{background:#03C75A;color:#fff;}.sk{background:#FEE500;color:#000;}.sg{background:var(--surf);color:var(--tx);border:1px solid var(--bd2);}.sa{background:#000;color:#fff;}

/* ═══════════ MODAL ═══════════ */
#mo{position:fixed;inset:0;background:var(--overlay);z-index:1000;display:none;align-items:flex-end;justify-content:center;}
#mo.on{display:flex;}
.mc{background:var(--surf);width:100%;max-width:480px;max-height:88vh;border-radius:18px 18px 0 0;display:flex;flex-direction:column;animation:mup .25s ease-out;transition:background .35s;}
@keyframes mup{from{transform:translateY(100%)}to{transform:translateY(0)}}
.mh{display:flex;align-items:center;padding:10px 14px;border-bottom:1px solid var(--bd);gap:6px;transition:all .35s;}
.mh .mt{flex:1;text-align:center;font-size:14px;font-weight:800;color:var(--tx);}
.cbtn{background:var(--bg3);border:none;border-radius:50%;width:30px;height:30px;font-size:13px;cursor:pointer;color:var(--sub);display:flex;align-items:center;justify-content:center;transition:all .2s;}
.fbtn2{background:none;border:none;font-size:20px;cursor:pointer;}
.mb{flex:1;overflow-y:auto;background:var(--bg);transition:background .35s;}
.mf{padding:10px 14px;border-top:1px solid var(--bd);display:flex;gap:6px;background:var(--surf);transition:all .35s;}
.btn{flex:1;padding:12px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;text-align:center;border:none;transition:.15s;}
.btn:active{transform:scale(0.97);}
.btn-o{background:var(--bg2);color:var(--tx);border:1px solid var(--bd2);}
.btn-b{background:#000;color:#fff;}[data-theme="dark"] .btn-b{background:var(--pri);color:#fff;}

/* ═══════════ GALLERY ═══════════ */
.gal{display:flex;gap:6px;padding:0 16px 12px;overflow-x:auto;}
.gal img{width:110px;height:82px;border-radius:10px;object-fit:cover;flex-shrink:0;border:1px solid var(--bd2);cursor:pointer;transition:transform .2s;}
.gal img:hover{transform:scale(1.03);}

/* ═══════════ DETAIL BLOCKS ═══════════ */
.igrid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin:0 16px 12px;}
.iitem{background:var(--bg2);border-radius:8px;padding:10px;transition:all .35s;}
.iitem .il{font-size:9px;color:var(--mu);margin-bottom:1px;}
.iitem .iv{font-size:11px;font-weight:600;color:var(--tx);}
.abox{display:flex;align-items:center;background:var(--bg2);padding:10px 12px;border-radius:8px;margin:0 16px 12px;border:1px solid var(--bd2);gap:6px;transition:all .35s;}
.cpbtn{background:var(--surf);border:1px solid var(--bd2);padding:4px 8px;border-radius:5px;font-size:9px;font-weight:700;cursor:pointer;color:var(--sub);white-space:nowrap;transition:all .2s;}
.tag{font-size:9px;color:var(--sub);background:var(--bg3);padding:3px 8px;border-radius:6px;display:inline-block;margin:0 3px 3px 0;transition:all .35s;}
.rvcard{background:var(--bg2);border-radius:8px;padding:11px;margin-bottom:6px;transition:all .35s;}

/* ═══════════ CALENDAR ═══════════ */
.cal-h{display:flex;justify-content:space-between;align-items:center;padding:0 16px;margin-bottom:10px;}
.cal-n{background:none;border:none;font-size:16px;color:var(--pri);cursor:pointer;padding:4px 10px;}
.cal-m{font-size:14px;font-weight:700;color:var(--tx);}
.cal-w{display:grid;grid-template-columns:repeat(7,1fr);text-align:center;font-size:10px;font-weight:600;color:var(--mu);margin-bottom:4px;padding:0 16px;}
.cal-d{display:grid;grid-template-columns:repeat(7,1fr);gap:2px 0;text-align:center;padding:0 16px;margin-bottom:12px;}
.cd{width:28px;height:28px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:12px;cursor:pointer;transition:.15s;margin:0 auto;color:var(--tx);}
.cd.today{color:var(--red);font-weight:700;}.cd.sel{background:var(--pri);color:#fff;font-weight:700;}
.cd.dis{color:var(--mu);cursor:not-allowed;text-decoration:line-through;}
.tgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;padding:0 16px 12px;}
.tbtn{padding:10px;border:1px solid var(--bd2);border-radius:8px;background:var(--surf);font-size:12px;font-weight:600;cursor:pointer;text-align:center;color:var(--tx);transition:.15s;}
.tbtn.on{background:var(--pri);color:#fff;border-color:var(--pri);}
.bform{padding:0 16px 16px;display:none;}.bform.on{display:block;}
.finp{width:100%;padding:10px;border:1px solid var(--bd2);border-radius:8px;margin-bottom:6px;font-size:12px;outline:none;background:var(--bg2);color:var(--tx);transition:all .35s;}

/* ═══════════ TOAST ═══════════ */
#toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--tx);color:var(--bg);padding:9px 20px;border-radius:10px;font-size:12px;font-weight:600;z-index:9999;opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap;}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0);}

/* Stars helper */
.st{color:#FACC15;}.sto{color:var(--mu);}
</style>
</head>
<body>
<div id="app" data-theme="light">
  <!-- HEADER -->
  <div class="hd">
    <span class="hd-logo">🔮</span>
    <span class="hd-title">운명지도</span>
    <span class="hd-user" id="hd-user"></span>
    <button class="theme-btn" id="thm">🌙</button>
  </div>

  <!-- CONTENT -->
  <div class="content">
    <!-- MAP VIEW -->
    <div id="v-map" class="vw on">
      <div class="filters">
        <div class="frow" id="fc"></div>
        <div class="frow" id="fr"></div>
        <div class="frow" id="fp"></div>
      </div>
      <div class="map-area">
        <div id="map"></div>
        <div class="map-badge" id="mbadge"></div>
      </div>
    </div>
    <!-- SEARCH VIEW -->
    <div id="v-search" class="vw" style="overflow-y:auto;background:var(--bg);">
      <div class="s-wrap"><input type="text" id="sinp" class="s-in" placeholder="점술인, 지역, 카테고리 검색..."></div>
      <div id="shist" style="padding:14px;"></div>
      <div id="sres" style="display:none;"></div>
    </div>
    <!-- WISHLIST -->
    <div id="v-wish" class="vw" style="overflow-y:auto;background:var(--bg2);"></div>
    <!-- MY -->
    <div id="v-my" class="vw" style="overflow-y:auto;background:var(--bg2);"></div>
  </div>

  <!-- BOTTOM NAV -->
  <div class="bnav" id="bnav"></div>

  <!-- MODAL -->
  <div id="mo"><div class="mc">
    <div class="mh">
      <button class="cbtn" id="mback" style="display:none">←</button>
      <div class="mt" id="mtitle"></div>
      <button class="fbtn2" id="mfav">🤍</button>
      <button class="cbtn" id="mclose">✕</button>
    </div>
    <div class="mb" id="mbody"></div>
    <div class="mf" id="mfoot"></div>
  </div></div>

  <div id="toast"></div>
</div>

function rfilt(){
  $('fc').innerHTML=CL.map(c=>`<button class="fb${cc===c.id?' on':''}" data-c="${c.id}" style="${cc===c.id?'background:'+c.c:''}">${c.ic} ${c.l}</button>`).join('');
  $('fr').innerHTML=RG.map(r=>`<button class="rb${cr===r?' on':''}" data-r="${r}">${r}</button>`).join('');
  $('fp').innerHTML=PR.map((p,i)=>`<button class="pb${cp===i?' on':''}" data-i="${i}">${p.l}</button>`).join('');
  $('fc').onclick=e=>{const b=e.target.closest('.fb');if(!b)return;cc=b.dataset.c;cr='전국';cp=0;rfilt();rmap();};
  $('fr').onclick=e=>{const b=e.target.closest('.rb');if(!b)return;cr=b.dataset.r;rfilt();rmap();};
  $('fp').onclick=e=>{const b=e.target.closest('.pb');if(!b)return;cp=+b.dataset.i;rfilt();rmap();};
}

// ═══════════════════════════════════
function rmap(){
  ml.clearLayers();
  const ls=gf();
  ls.forEach(p=>{
    const c=CT[p.cat];
    const ic=L.divIcon({className:'',html:`<div class="custom-marker" style="background:${c.c};width:36px;height:36px;font-size:16px;color:#fff">${p.ic}</div>`,iconSize:[36,36],iconAnchor:[18,36],popupAnchor:[0,-30]});
    const m=L.marker([p.lat,p.lng],{icon:ic}).addTo(ml);
    const vb=p.vf?'<span class="v-badge">✓ 인증</span>':'';
    m.bindPopup(`<div style="padding:12px 14px;color:var(--tx)"><div style="display:flex;align-items:center;gap:7px;margin-bottom:5px"><span style="font-size:24px">${p.ic}</span><div><div style="font-size:14px;font-weight:800">${p.n} ${vb}</div><span style="font-size:9px;font-weight:600;padding:2px 7px;border-radius:8px;background:${c.bg};color:${c.c}">${c.l}</span></div></div><div style="font-size:10px;color:var(--sub);margin-bottom:5px">📍 ${p.addr}</div><div style="display:flex;align-items:center;gap:5px"><span style="font-size:18px;font-weight:800;color:var(--pri)">${p.rt}</span>${st(p.rt,12)}<span style="font-size:10px;color:var(--mu)">(${p.rv.toLocaleString()})</span></div><div style="font-size:11px;font-weight:700;color:${c.c};margin-top:3px">💰 ${p.prl} · ${p.sp}</div><button onclick="openD(${p.id})" style="display:block;width:100%;padding:9px;margin-top:8px;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;color:#fff;background:${c.c}">상세 정보 보기</button></div>`,{maxWidth:270,closeButton:true});
  });
  if(ls.length>0&&ls.length<P.length){map.fitBounds(L.latLngBounds(ls.map(p=>[p.lat,p.lng])).pad(0.3),{animate:true});}
  else{map.setView([36.0,127.5],7,{animate:true});}
  $('mbadge').innerHTML=`📍 <b>${ls.length}</b>곳 <span style="font-size:9px;color:var(--mu);margin-left:2px">${cr} · ${PR[cp].l}</span>`;
}

function sw(v){
  cv=v;document.querySelectorAll('.vw').forEach(el=>el.classList.remove('on'));

  rnav();

}
function rnav(){
  const its=[["map","🗺️","지도"],["search","🔍","검색"],["wish","❤️","찜"],["my","👤","마이"]];
  $('bnav').innerHTML=its.map(([v,ic,lb])=>`<button class="nv${cv===v?' on':''}" data-v="${v}"><span class="nv-ic">${ic}</span>${lb}${v==='wish'&&fav.length?`<span class="nv-badge">${fav.length}</span>`:''}</button>`).join('');

}

  $('shist').style.display='none';const r=$('sres');r.style.display='block';
  const ls=gf(q);
  r.innerHTML=`<div style="padding:8px 14px;font-size:11px;color:var(--sub);border-bottom:1px solid var(--bd)">결과 <span style="color:var(--pri);font-weight:700">${ls.length}</span>건</div>${ls.length===0?'<div style="text-align:center;padding:40px;color:var(--mu);font-size:12px">검색 결과 없음</div>':ls.map(p=>{const c=CT[p.cat];return`<div class="si" onclick="addSH('${q}');openD(${p.id})"><div class="si-ic" style="background:${cbg(p.cat)}">${p.ic}</div><div style="flex:1"><div style="font-size:12px;font-weight:700;display:flex;align-items:center;gap:4px;color:var(--tx)">${p.n}${p.vf?'<span class="v-badge">✓ 인증</span>':''}<span style="font-size:8px;color:${c.c};background:${cbg(p.cat)};padding:1px 5px;border-radius:6px">${c.l}</span></div><div style="font-size:10px;color:var(--sub)">📍 ${p.addr}</div><div style="font-size:10px;font-weight:700;color:var(--pri);margin-top:1px">⭐ ${p.rt} · ${p.prl}</div></div></div>`;}).join('')}`;
};
window.addSH=q=>{sh=[q,...sh.filter(h=>h!==q)].slice(0,10);};

// ═══════════════════════════════════
//  WISHLIST
// ═══════════════════════════════════
function rwish(){
  const el=$('v-wish');
  if(!fav.length){el.innerHTML=`<div style="padding:16px"><h2 style="font-size:16px;font-weight:800;color:var(--tx)">❤️ 찜한 곳</h2></div><div style="text-align:center;padding:40px;color:var(--mu);font-size:12px">찜한 점술가가 없습니다.</div>`;return;}
  el.innerHTML=`<div style="padding:14px 16px"><h2 style="font-size:16px;font-weight:800;color:var(--tx)">❤️ 찜한 곳 <span style="color:var(--pri)">${fav.length}</span></h2></div>`+fav.map(fid=>{const p=P.find(x=>x.id===fid);if(!p)return'';const c=CT[p.cat];return`<div class="wcard" onclick="openD(${p.id})"><div style="width:44px;height:44px;border-radius:10px;background:${cbg(p.cat)};display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0">${p.ic}</div><div style="flex:1"><div style="font-size:13px;font-weight:700;display:flex;align-items:center;gap:4px;color:var(--tx)">${p.n}${p.vf?'<span class="v-badge">✓</span>':''}</div><div style="font-size:10px;color:var(--sub)">📍 ${p.addr}</div><div style="font-size:11px;font-weight:700;color:var(--pri);margin-top:1px">⭐ ${p.rt} · ${p.prl}</div></div><button onclick="event.stopPropagation();fav=fav.filter(f=>f!==${p.id});rwish();rnav();toast('삭제됨')" style="background:none;border:none;font-size:18px;cursor:pointer">❤️</button></div>`;}).join('');
}

// ═══════════════════════════════════
//  MY PAGE
// ═══════════════════════════════════
function rmy(){
  $('hd-user').textContent=li?lu:'';
  const el=$('v-my');
  if(!li){el.innerHTML=`<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;padding:30px;background:var(--surf);transition:all .35s"><div style="font-size:44px;margin-bottom:6px">🔮</div><div style="font-size:18px;font-weight:800;margin-bottom:3px;color:var(--tx)">운명지도 시작하기</div><div style="font-size:11px;color:var(--mu);margin-bottom:24px">로그인하고 예약·찜 기능을 이용하세요</div><button class="sbtn sn" onclick="doLI('네이버')"><b>N</b> 네이버로 로그인</button><button class="sbtn sk" onclick="doLI('카카오')"><b style='font-weight:900'>K</b> 카카오로 로그인</button><button class="sbtn sg" onclick="doLI('구글')"><b style='color:#EA4335'>G</b> 구글로 로그인</button><button class="sbtn sa" onclick="doLI('Apple')"> Apple로 로그인</button><div style="font-size:9px;color:var(--mu);margin-top:12px;text-align:center;line-height:1.4">로그인 시 이용약관 및 개인정보 처리방침에 동의</div></div>`;return;}
  el.innerHTML=`<div style="padding:16px;background:var(--surf);border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;transition:all .35s"><div><div style="font-size:15px;font-weight:800;color:var(--tx)">${lu}님, 환영합니다!</div><div style="font-size:10px;color:var(--mu);margin-top:2px">오늘도 좋은 운이 가득하길 🍀</div></div><button onclick="doLO()" style="padding:5px 10px;border-radius:6px;font-size:10px;font-weight:600;color:var(--sub);background:var(--bg3);border:none;cursor:pointer">로그아웃</button></div><h3 style="font-size:14px;font-weight:800;padding:0 16px;margin-bottom:8px;color:var(--tx)">📅 나의 예약</h3>${res.length?[...res].reverse().map(r=>`<div class="rcard"><div style="display:flex;justify-content:space-between;margin-bottom:6px"><span class="rstatus ${r.st}">${r.st==='active'?'예약 확정':r.st==='completed'?'방문 완료':'예약취소'}</span><span style="font-size:9px;color:var(--mu)">#${r.id}</span></div><div style="font-size:14px;font-weight:800;margin-bottom:4px;color:var(--tx)">${r.n}</div><div style="font-size:11px;color:var(--sub)">📅 ${r.dt} ${r.tm} &nbsp; 💰 ${r.pr}</div>${r.st==='active'?`<button onclick="cRes('${r.id}')" style="width:100%;margin-top:8px;padding:8px;border-radius:6px;border:1px solid var(--bd2);background:var(--surf);font-size:11px;font-weight:600;cursor:pointer;color:var(--red)">예약 취소</button>`:''}</div>`).join(''):'<div style="text-align:center;padding:20px;color:var(--mu);font-size:11px">예약 내역 없음</div>'}<h3 style="font-size:14px;font-weight:800;padding:10px 16px 8px;color:var(--tx)">💳 결제 내역</h3>${pay.length?[...pay].reverse().map(p=>`<div class="pcard"><div><div style="font-size:12px;font-weight:700;color:var(--tx)">${p.n}</div><div style="font-size:10px;color:var(--mu);margin-top:1px">${p.dt} · ${p.mt}</div></div><div style="font-size:13px;font-weight:800;color:var(--tx)">${p.pr}</div></div>`).join(''):'<div style="text-align:center;padding:20px;color:var(--mu);font-size:11px">결제 내역 없음</div>'}<div style="height:20px"></div>`;
}
window.doLI=p=>{li=true;lu=p+' 유저';rmy();toast(p+' 로그인 완료!');};
window.doLO=()=>{li=false;lu='';rmy();toast('로그아웃');};
window.cRes=id=>{if(!confirm('예약을 취소하시겠습니까?'))return;res=res.map(r=>r.id===id?{...r,st:'cancelled'}:r);rmy();toast('취소됨');};

// ═══════════════════════════════════
//  MODAL
// ═══════════════════════════════════
window.openD=function(id){const p=P.find(x=>x.id===id);if(!p)return;cp2=p;mm='detail';map.closePopup();rmod();$('mo').classList.add('on');};
function closeM(){$('mo').classList.remove('on');cp2=null;}
$('mclose').onclick=closeM;
$('mfav').onclick=()=>{if(!cp2)return;const id=cp2.id;if(fav.includes(id)){fav=fav.filter(f=>f!==id);toast('삭제됨');}else{fav.push(id);toast('추가됨 ❤️');}$('mfav').textContent=fav.includes(id)?'❤️':'🤍';rnav();};
$('mback').onclick=()=>{mm='detail';rmod();};

function rmod(){
  if(!cp2)return;const p=cp2,c=CT[p.cat];
  $('mfav').textContent=fav.includes(p.id)?'❤️':'🤍';
  $('mfav').style.display=mm==='detail'?'block':'none';
  $('mback').style.display=mm==='booking'?'flex':'none';
  $('mtitle').textContent=mm==='detail'?p.n:'예약하기';

  if(mm==='detail'){
    const rv=RV.filter(r=>r.pid===p.id);
    const gal=p.photos&&p.photos.length?`<div style="padding:2px 16px 4px"><div style="font-size:11px;font-weight:700;color:var(--tx);margin-bottom:6px">📸 상담 공간 갤러리</div></div><div class="gal">${p.photos.map(u=>`<img src="${u}" alt="상담공간" onerror="this.style.display='none'">`).join('')}</div>`:'';
    const vhtml=p.vf?`<div style="display:flex;align-items:center;gap:4px;justify-content:center;margin-top:5px"><span style="background:#ECFDF5;color:#059669;padding:3px 10px;border-radius:16px;font-size:10px;font-weight:700;display:inline-flex;align-items:center;gap:3px">✓ 인증 전문가</span></div>`:'';

    $('mbody').innerHTML=`
      <div style="text-align:center;padding:18px 0 4px">
        <div style="font-size:40px;margin-bottom:4px">${p.ic}</div>
        <div style="display:flex;align-items:center;justify-content:center;gap:4px">
          <span style="font-size:9px;font-weight:600;color:${c.c};background:${cbg(p.cat)};padding:2px 8px;border-radius:10px">${c.l}</span>
          <span style="font-size:10px;color:var(--mu)">${p.sp} · ${p.exp}</span>
        </div>
        ${vhtml}
      </div>
      <div style="margin:10px 16px;background:linear-gradient(135deg,${c.c}08,${c.c}15);border-radius:12px;padding:14px;display:flex;align-items:center;gap:12px">
        <div style="text-align:center"><div style="font-size:32px;font-weight:800;color:${c.c};line-height:1">${p.rt}</div>${st(p.rt,13)}<div style="font-size:9px;color:var(--mu);margin-top:2px">리뷰 ${p.rv.toLocaleString()}개</div></div>
        <div style="flex:1">${[10,8,6,4,2].map(s=>`<div style="display:flex;align-items:center;gap:3px;margin-bottom:1px"><span style="font-size:8px;color:var(--mu);width:14px;text-align:right">${s}+</span><div style="flex:1;height:2.5px;background:var(--bd2);border-radius:2px;overflow:hidden"><div style="width:${s>=8?70:s>=6?18:s>=4?8:4}%;height:100%;background:${c.c}"></div></div></div>`).join('')}</div>
      </div>
      ${gal}
      <div class="igrid">${[["👤","전문가",p.sp],["⏰","경력",p.exp],["💰","상담비",p.prl],["📞","전화",p.ph],["🕐","영업",p.hrs],["📅","휴무",p.cls]].map(([ic,lb,vl])=>`<div class="iitem"><div class="il">${ic} ${lb}</div><div class="iv">${vl}</div></div>`).join('')}</div>
      <div class="abox"><span style="font-size:11px;flex:1;color:var(--tx)">📍 ${p.addr}</span><button class="cpbtn" onclick="navigator.clipboard&&navigator.clipboard.writeText('${p.addr}');toast('복사됨')">복사</button></div>
      <div style="margin:0 16px 10px;background:var(--bg2);border-radius:8px;padding:11px;transition:all .35s"><div style="font-size:11px;font-weight:600;margin-bottom:4px;color:var(--tx)">소개</div><div style="font-size:11px;color:var(--tx2);line-height:1.6">${p.desc}</div></div>
      <div style="margin:0 16px 10px;display:flex;flex-wrap:wrap;gap:3px">${p.tags.map(t=>`<span class="tag">#${t}</span>`).join('')}</div>
      ${rv.length?`<div style="margin:0 16px 16px"><div style="font-size:12px;font-weight:700;margin-bottom:6px;color:var(--tx)">리뷰 (${rv.length})</div>${rv.map(r=>`<div class="rvcard"><div style="display:flex;justify-content:space-between;margin-bottom:4px"><div style="display:flex;align-items:center;gap:4px"><span style="font-size:11px;font-weight:700;color:var(--tx)">${r.au}</span>${st(r.sc,9)}${r.vf?'<span class="rv-badge">✓ 실결제</span>':''}</div><span style="font-size:9px;color:var(--mu)">${r.dt}</span></div><div style="font-size:10px;color:var(--tx2);line-height:1.5">${r.tx}</div><div style="font-size:9px;color:var(--mu);margin-top:3px">👍 ${r.hl}</div></div>`).join('')}</div>`:''}`;
    $('mfoot').innerHTML=`<button class="btn btn-o" onclick="toast('전화 연결 중...')">📞 전화</button><button class="btn" style="flex:2;background:${c.c};color:#fff" onclick="startB()">📅 예약하기</button>`;
  } else rbookv();
}

// ═══════════════════════════════════
//  BOOKING
// ═══════════════════════════════════
window.startB=function(){if(!li){toast('로그인 필요');closeM();sw('my');return;}mm='booking';cvm=new Date();csel=new Date();btm=null;rmod();};
function rbookv(){
  const p=cp2;
  $('mbody').innerHTML=`<div style="padding:12px 16px 4px"><h3 style="font-size:13px;font-weight:700;color:var(--tx)">📅 날짜 선택</h3></div><div id="calbox"></div><div style="padding:8px 16px 4px"><h3 style="font-size:12px;font-weight:700;color:var(--tx)">⏰ 시간 선택</h3></div><div class="tgrid" id="tg"></div><div class="bform" id="bf"><h3 style="font-size:12px;font-weight:700;margin-bottom:6px;color:var(--tx)">예약자 정보</h3><input class="finp" id="bn" placeholder="이름"><input class="finp" id="bp" placeholder="전화번호"><div style="background:var(--bg2);border-radius:8px;padding:11px;margin-top:3px;transition:all .35s"><div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-size:11px;color:var(--sub)">상담비</span><span style="font-size:12px;font-weight:700;color:var(--tx)">${p.prl}</span></div><div style="display:flex;justify-content:space-between"><span style="font-size:11px;color:var(--sub)">결제</span><span style="font-size:11px;font-weight:600;color:var(--tx)">간편결제</span></div></div></div>`;
  rcal();rtg();
  $('mfoot').innerHTML=`<button class="btn btn-b" style="flex:1" onclick="cfBook()">💳 ${p.prl} 결제하기</button>`;
}
function rcal(){
  const y=cvm.getFullYear(),m=cvm.getMonth(),fd=new Date(y,m,1).getDay(),dim=new Date(y,m+1,0).getDate();
  const td=new Date();td.setHours(0,0,0,0);let d='';
  for(let i=0;i<fd;i++)d+='<div></div>';
  for(let i=1;i<=dim;i++){const dt=new Date(y,m,i);dt.setHours(0,0,0,0);const isT=dt.getTime()===td.getTime(),isS=csel&&dt.toDateString()===csel.toDateString(),isP=dt<td;d+=`<div class="cd${isT&&!isS?' today':''}${isS?' sel':''}${isP?' dis':''}" ${!isP?`onclick="selD(${y},${m},${i})"`:''} >${i}</div>`;}
  $('calbox').innerHTML=`<div class="cal-h"><button class="cal-n" onclick="cvm.setMonth(cvm.getMonth()-1);rcal()">❮</button><div class="cal-m">${y}년 ${m+1}월</div><button class="cal-n" onclick="cvm.setMonth(cvm.getMonth()+1);rcal()">❯</button></div><div class="cal-w">${['일','월','화','수','목','금','토'].map((x,i)=>`<div style="color:${i===0?'var(--red)':i===6?'var(--tarot)':''}">${x}</div>`).join('')}</div><div class="cal-d">${d}</div>`;
}
window.selD=(y,m,d)=>{csel=new Date(y,m,d);btm=null;rcal();rtg();const bf=$('bf');if(bf)bf.classList.remove('on');};
function rtg(){const el=$('tg');if(!el)return;el.innerHTML=["09:00","10:00","11:00","12:00","13:00","14:00","15:00","16:00","17:00","18:00","19:00","20:00"].map(t=>`<button class="tbtn${btm===t?' on':''}" onclick="selT('${t}')">${t}</button>`).join('');}
window.selT=t=>{btm=t;rtg();const bf=$('bf');if(bf)bf.classList.add('on');$('mbody').scrollTo({top:$('mbody').scrollHeight,behavior:'smooth'});};
window.cfBook=function(){if(!csel||!btm)return toast('날짜·시간 선택');const nm=$('bn').value,ph=$('bp').value;if(!nm||!ph)return toast('정보 입력 필요');const ds=`${csel.getFullYear()}-${String(csel.getMonth()+1).padStart(2,'0')}-${String(csel.getDate()).padStart(2,'0')}`;res.push({id:'R'+Date.now().toString().slice(-6),pid:cp2.id,n:cp2.n,dt:ds,tm:btm,pr:cp2.prl,st:'active'});const td=new Date();pay.push({id:'P'+Date.now().toString().slice(-6),n:cp2.n,dt:`${td.getFullYear()}-${String(td.getMonth()+1).padStart(2,'0')}-${String(td.getDate()).padStart(2,'0')}`,pr:cp2.prl,mt:'간편결제'});toast(cp2.n+' 예약 완료!');closeM();sw('my');};

// ═══════════════════════════════════
//  INIT
// ═══════════════════════════════════
rfilt();rmap();rnav();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>운명지도</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.iamport.kr/v1/iamport.js" async></script>
<style>
:root{--pri:#6B4EFF;--saju:#E85D3A;--sinj:#2DB67D;--taro:#3B82F6;--gwan:#F59E0B;--bg:#fff;--bg2:#F8FAFC;--bg3:#F1F5F9;--sf:#fff;--tx:#0F172A;--tx2:#475569;--sub:#64748B;--mu:#94A3B8;--bd:#F1F5F9;--bd2:#E2E8F0;--red:#EF4444;--sh:0 2px 8px rgba(0,0,0,.06);--ov:rgba(0,0,0,.5);}
[data-theme="dark"]{--pri:#9B85FF;--bg:#0A0D1C;--bg2:#0F1328;--bg3:#171C38;--sf:#111530;--tx:#E4E2F0;--tx2:#A09CC0;--sub:#706C98;--mu:#504C78;--bd:#1A1F3A;--bd2:#252B50;--sh:0 2px 12px rgba(0,0,0,.4);--ov:rgba(4,4,16,.88);}
[data-theme="dark"] .leaflet-tile-pane{filter:brightness(.6) contrast(1.15) saturate(.7) hue-rotate(210deg);}
[data-theme="dark"] .leaflet-control-zoom a{background:var(--bg3)!important;color:var(--tx)!important;border-color:var(--bd2)!important;}
*{box-sizing:border-box;margin:0;padding:0;font-family:'Pretendard',-apple-system,sans-serif;}
html,body{height:100%;width:100%;overflow:hidden;background:#0A0D1C;}
body{display:flex;justify-content:center;}
::-webkit-scrollbar{width:0;height:0;}
#app{display:flex;flex-direction:column;height:100vh;height:100dvh;width:100%;max-width:480px;background:var(--bg);position:relative;box-shadow:0 0 40px rgba(0,0,0,.2);overflow:hidden;transition:background .35s;}

.hd{height:50px;min-height:50px;padding:0 16px;background:var(--sf);display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--bd);z-index:100;transition:all .35s;}
.hd-t{font-size:19px;font-weight:800;background:linear-gradient(135deg,var(--pri),#E85D3A);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.hd-u{font-size:12px;color:var(--pri);font-weight:600;margin-left:auto;}
.thm{background:none;border:none;font-size:20px;cursor:pointer;padding:6px;border-radius:8px;line-height:1;}

.bnav{height:58px;min-height:58px;background:var(--sf);border-top:1px solid var(--bd);display:flex;justify-content:space-around;align-items:center;z-index:100;transition:all .35s;}
.nv{display:flex;flex-direction:column;align-items:center;gap:2px;color:var(--sub);font-size:11px;font-weight:500;cursor:pointer;background:none;border:none;position:relative;padding:4px 14px;}
.nv.on{color:var(--pri);font-weight:700;}
.nv-ic{font-size:20px;}
.nv-bg{position:absolute;top:0;right:4px;background:var(--red);color:#fff;font-size:8px;font-weight:700;min-width:14px;height:14px;border-radius:7px;display:flex;align-items:center;justify-content:center;padding:0 3px;}

.ct{flex:1 1 0;min-height:0;position:relative;overflow:hidden;}
.vw{position:absolute;inset:0;display:none;flex-direction:column;overflow:hidden;}.vw.on{display:flex;}

/* FILTERS */
.flt{background:var(--sf);border-bottom:1px solid var(--bd);flex-shrink:0;transition:all .35s;padding:6px 10px 4px;}
.frow{display:flex;gap:5px;margin-bottom:4px;overflow-x:auto;white-space:nowrap;}
/* 2-row region grid */
.rgrid{display:flex;flex-wrap:wrap;gap:4px 5px;margin-bottom:4px;}
.fb{padding:6px 14px;border-radius:20px;border:none;font-size:12px;font-weight:600;cursor:pointer;background:var(--bg3);color:var(--sub);transition:all .15s;flex-shrink:0;}.fb.on{color:#fff;}
.rb{padding:5px 10px;border-radius:8px;border:1px solid var(--bd2);background:var(--sf);color:var(--sub);font-size:11px;font-weight:600;cursor:pointer;flex-shrink:0;transition:all .15s;}.rb.on{background:var(--tx);color:var(--bg);border-color:var(--tx);}
.pb{padding:5px 10px;border-radius:8px;border:1px solid var(--bd2);background:var(--sf);color:var(--sub);font-size:11px;font-weight:600;cursor:pointer;flex-shrink:0;transition:all .15s;}.pb.on{background:var(--pri);color:#fff;border-color:var(--pri);}

/* MAP */
.ma{flex:1 1 0;min-height:0;position:relative;}
#map{position:absolute;top:0;left:0;width:100%;height:100%;}
.mbg{position:absolute;top:8px;left:8px;background:var(--sf);border-radius:12px;padding:8px 12px;box-shadow:var(--sh);z-index:500;font-size:13px;font-weight:700;color:var(--tx);pointer-events:none;border:1px solid var(--bd);transition:all .35s;line-height:1.6;}
.mbg .cc{display:inline-flex;align-items:center;gap:3px;margin-right:6px;font-size:12px;font-weight:700;}
.mbg .cd{width:8px;height:8px;border-radius:50%;display:inline-block;}
.leaflet-popup-content-wrapper{border-radius:14px!important;padding:0!important;box-shadow:0 4px 20px rgba(0,0,0,.15)!important;border:1px solid var(--bd2)!important;background:var(--sf)!important;}
.leaflet-popup-content{margin:0!important;width:auto!important;min-width:230px;max-width:280px;}
.leaflet-popup-tip{display:none;}
.cm{border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 12px rgba(0,0,0,.3);border:2.5px solid #fff;cursor:pointer;transition:transform .2s;}.cm:hover{transform:scale(1.15);}

/* BADGES */
.vb{display:inline-flex;align-items:center;gap:2px;font-size:10px;font-weight:700;color:#059669;background:#ECFDF5;padding:2px 8px;border-radius:8px;white-space:nowrap;}
[data-theme="dark"] .vb{background:#0D2818;color:#34D399;}
.rvb{display:inline-flex;align-items:center;gap:2px;font-size:10px;font-weight:700;color:var(--pri);background:#EDE9FE;padding:2px 7px;border-radius:7px;}
[data-theme="dark"] .rvb{background:#1A1540;color:#A78BFA;}

/* SEARCH */
.sw{padding:12px;background:var(--sf);border-bottom:1px solid var(--bd);flex-shrink:0;}
.sinp{width:100%;padding:11px 16px;border:2px solid var(--pri);border-radius:12px;font-size:15px;font-weight:600;outline:none;background:var(--bg2);color:var(--tx);transition:all .35s;}
.stag{padding:6px 13px;background:var(--bg2);border:1px solid var(--bd);border-radius:20px;font-size:13px;cursor:pointer;display:inline-block;margin:0 5px 7px 0;color:var(--tx);}
.si{padding:13px 14px;border-bottom:1px solid var(--bd);cursor:pointer;display:flex;align-items:center;gap:12px;}
.si:active{background:var(--bg2);}
.si-ic{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}

/* CARDS */
.wc{margin:0 14px 10px;background:var(--sf);border-radius:14px;padding:14px;border:1px solid var(--bd);display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .35s;}
.rc{background:var(--sf);border-radius:14px;padding:16px;margin:0 14px 10px;border:1px solid var(--bd);transition:all .35s;}
.pc{margin:0 14px 10px;background:var(--sf);border-radius:12px;padding:14px;border:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center;transition:all .35s;}
.rs{padding:3px 10px;border-radius:6px;font-size:11px;font-weight:700;}
.rs.active{background:#EFF6FF;color:var(--pri);}[data-theme="dark"] .rs.active{background:#151A40;}
.rs.completed{background:var(--bg3);color:var(--sub);}
.rs.cancelled{background:#FEF2F2;color:var(--red);}[data-theme="dark"] .rs.cancelled{background:#200F15;}

/* LOGIN */
.sb{width:100%;max-width:320px;padding:14px;border-radius:12px;font-size:15px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:10px;cursor:pointer;border:none;transition:.15s;}
.sb:active{transform:scale(.97);}
.sn{background:#03C75A;color:#fff;}.sk{background:#FEE500;color:#000;}.sg{background:var(--sf);color:var(--tx);border:1px solid var(--bd2);}.sa{background:#000;color:#fff;}

/* MODAL */
#mo{position:fixed;inset:0;background:var(--ov);z-index:1000;display:none;align-items:flex-end;justify-content:center;}
#mo.on{display:flex;}
.mc{background:var(--sf);width:100%;max-width:480px;max-height:88vh;border-radius:20px 20px 0 0;display:flex;flex-direction:column;animation:mu .25s ease-out;transition:background .35s;}
@keyframes mu{from{transform:translateY(100%)}to{transform:translateY(0)}}
.mh{display:flex;align-items:center;padding:12px 16px;border-bottom:1px solid var(--bd);gap:8px;}
.mh .mt{flex:1;text-align:center;font-size:16px;font-weight:800;color:var(--tx);}
.cb{background:var(--bg3);border:none;border-radius:50%;width:32px;height:32px;font-size:14px;cursor:pointer;color:var(--sub);display:flex;align-items:center;justify-content:center;}
.fvb{background:none;border:none;font-size:22px;cursor:pointer;}
.mb{flex:1;overflow-y:auto;background:var(--bg);transition:background .35s;}
.mf{padding:10px 14px;border-top:1px solid var(--bd);display:flex;gap:8px;background:var(--sf);}
.btn{flex:1;padding:13px;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;text-align:center;border:none;transition:.15s;}
.btn:active{transform:scale(.97);}
.btn-o{background:var(--bg2);color:var(--tx);border:1px solid var(--bd2);}
.btn-b{background:#000;color:#fff;}[data-theme="dark"] .btn-b{background:var(--pri);color:#fff;}

/* GALLERY */
.gal{display:flex;gap:8px;padding:0 18px 14px;overflow-x:auto;}.gal img{width:120px;height:88px;border-radius:12px;object-fit:cover;flex-shrink:0;border:1px solid var(--bd2);cursor:pointer;transition:transform .2s;}.gal img:hover{transform:scale(1.03);}

/* DETAIL */
.ig{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:0 18px 14px;}
.ii{background:var(--bg2);border-radius:10px;padding:12px;transition:all .35s;}
.il{font-size:11px;color:var(--mu);margin-bottom:2px;}.iv{font-size:13px;font-weight:600;color:var(--tx);}
.ab{display:flex;align-items:center;background:var(--bg2);padding:11px 14px;border-radius:10px;margin:0 18px 14px;border:1px solid var(--bd2);gap:8px;}
.cpb{background:var(--sf);border:1px solid var(--bd2);padding:5px 10px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;color:var(--sub);white-space:nowrap;}
.tg{font-size:11px;color:var(--sub);background:var(--bg3);padding:4px 10px;border-radius:8px;display:inline-block;margin:0 4px 4px 0;}
.rvc{background:var(--bg2);border-radius:10px;padding:13px;margin-bottom:8px;transition:all .35s;}

/* REVIEW FORM */
.rv-form{background:var(--bg2);border-radius:12px;padding:16px;margin:0 18px 14px;border:1px solid var(--bd2);}
.rv-stars-sel{display:flex;gap:4px;margin-bottom:10px;}
.rv-star{font-size:28px;cursor:pointer;background:none;border:none;padding:0;transition:transform .15s;}
.rv-star:hover{transform:scale(1.2);}
.rv-ta{width:100%;padding:12px;border:1px solid var(--bd2);border-radius:10px;font-size:14px;outline:none;background:var(--sf);color:var(--tx);resize:none;min-height:80px;transition:all .35s;font-family:inherit;}
.rv-submit{width:100%;padding:12px;border-radius:10px;border:none;background:var(--pri);color:#fff;font-size:14px;font-weight:700;cursor:pointer;margin-top:8px;}

/* CALENDAR */
.cal-h{display:flex;justify-content:space-between;align-items:center;padding:0 18px;margin-bottom:10px;}
.cal-n{background:none;border:none;font-size:18px;color:var(--pri);cursor:pointer;padding:4px 12px;}
.cal-m{font-size:16px;font-weight:700;color:var(--tx);}
.cal-w{display:grid;grid-template-columns:repeat(7,1fr);text-align:center;font-size:12px;font-weight:600;color:var(--mu);margin-bottom:6px;padding:0 18px;}
.cal-d{display:grid;grid-template-columns:repeat(7,1fr);gap:3px 0;text-align:center;padding:0 18px;margin-bottom:14px;}
.cd{width:32px;height:32px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer;transition:.15s;margin:0 auto;color:var(--tx);}
.cd.today{color:var(--red);font-weight:700;}.cd.sel{background:var(--pri);color:#fff;font-weight:700;}.cd.dis{color:var(--mu);cursor:not-allowed;text-decoration:line-through;}
.tgd{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:0 18px 14px;}
.tb{padding:11px;border:1px solid var(--bd2);border-radius:10px;background:var(--sf);font-size:14px;font-weight:600;cursor:pointer;text-align:center;color:var(--tx);transition:.15s;}.tb.on{background:var(--pri);color:#fff;border-color:var(--pri);}
.bf{padding:0 18px 18px;display:none;}.bf.on{display:block;}
.fi{width:100%;padding:12px;border:1px solid var(--bd2);border-radius:10px;margin-bottom:8px;font-size:14px;outline:none;background:var(--bg2);color:var(--tx);transition:all .35s;}
.pm-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.pm-btn{padding:12px 8px;border:2px solid var(--bd2);border-radius:12px;background:var(--sf);cursor:pointer;text-align:center;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:4px;}
.pm-btn.on{border-color:var(--pri);background:var(--bg2);}
.pm-btn:active{transform:scale(.97);}
.pm-ic{font-size:22px;}.pm-lb{font-size:12px;font-weight:600;color:var(--tx);}
.pay-result{background:var(--bg2);border-radius:14px;padding:20px;margin:20px 18px;text-align:center;border:1px solid var(--bd2);}
.pay-ok{color:#059669;font-size:44px;margin-bottom:8px;}
.pay-fail{color:var(--red);font-size:44px;margin-bottom:8px;}

/* TOAST */
#toast{position:fixed;bottom:72px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--tx);color:var(--bg);padding:10px 22px;border-radius:12px;font-size:14px;font-weight:600;z-index:9999;opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap;}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0);}
.st{color:#FACC15;}.sto{color:var(--mu);}
</style>
</head>
<body>
<div id="app" data-theme="light">
  <div class="hd"><span style="font-size:22px">🔮</span><span class="hd-t">운명지도</span><div style="flex:1"></div><span class="hd-u" id="hu"></span><button class="thm" id="thm">🌙</button></div>
  <div class="ct">
    <div id="v-map" class="vw on">
      <div class="flt">
        <div class="frow" id="fc"></div>
        <div class="rgrid" id="fr"></div>

      </div>
      <div class="ma"><div id="map"></div><div class="mbg" id="mbg"></div></div>
    </div>
    <div id="v-search" class="vw" style="overflow-y:auto;background:var(--bg);">
      <div class="sw"><input type="text" id="sinp" class="sinp" placeholder="점술인, 지역, 카테고리 검색..."></div>
      <div id="shist" style="padding:14px"></div><div id="sres" style="display:none"></div>

    <div id="v-wish" class="vw" style="overflow-y:auto;background:var(--bg2)"></div>
    <div id="v-my" class="vw" style="overflow-y:auto;background:var(--bg2)"></div>
  </div>
  <div class="bnav" id="bnav"></div>
  <div id="mo"><div class="mc">
    <div class="mh"><button class="cb" id="mback" style="display:none">←</button><div class="mt" id="mtitle"></div><button class="fvb" id="mfav">🤍</button><button class="cb" id="mcl">✕</button></div>
    <div class="mb" id="mbody"></div><div class="mf" id="mfoot"></div>
  </div></div>
  <div id="toast"></div>
</div>

// Category count badge
function mkBadge(ls){
  const cnt={saju:0,sinjeom:0,tarot:0,gwansang:0};
  ls.forEach(p=>cnt[p.cat]=(cnt[p.cat]||0)+1);
  const parts=Object.entries(cnt).filter(([,v])=>v>0).map(([k,v])=>`<span class="cc"><span class="cd" style="background:${CT[k].c}"></span>${CT[k].l} ${v}</span>`).join('');
  return `📍 <b>${ls.length}</b>곳<br>${parts}`;
}
// Update badge on map move/zoom (shows only places in viewport)
function updBadge(){
  const b=map.getBounds();
  const vis=gf().filter(p=>b.contains([p.lat,p.lng]));

}

// ═══════ MODAL ═══════
window.openD=function(id){const p=D.find(x=>x.id===id);if(!p)return;cp2=p;mm='detail';rvScore=0;map.closePopup();rmod();$('mo').classList.add('on');};
function closeM(){$('mo').classList.remove('on');cp2=null;}
$('mcl').onclick=closeM;
$('mfav').onclick=()=>{if(!cp2)return;const id=cp2.id;if(fav.includes(id)){fav=fav.filter(f=>f!==id);toast('삭제됨');}else{fav.push(id);toast('추가됨 ❤️');}$('mfav').textContent=fav.includes(id)?'❤️':'🤍';rnav();};
$('mback').onclick=()=>{mm='detail';rmod();};

function rmod(){
  if(!cp2)return;const p=cp2,c=CT[p.cat];
  $('mfav').textContent=fav.includes(p.id)?'❤️':'🤍';$('mfav').style.display=mm==='detail'?'block':'none';
  $('mback').style.display=mm==='booking'?'flex':'none';$('mtitle').textContent=mm==='detail'?p.n:'예약하기';
  if(mm==='detail'){
    const rv=[...RV_DB.filter(r=>r.pid===p.id),...myRv.filter(r=>r.pid===p.id).map(r=>({...r,au:lu||'나',vf:1,hl:0}))];
    const gal=p.photos&&p.photos.length?`<div style="padding:2px 18px 4px"><div style="font-size:13px;font-weight:700;color:var(--tx);margin-bottom:8px">📸 상담 공간 갤러리</div></div><div class="gal">${p.photos.map(u=>`<img src="${u}" alt="상담공간" onerror="this.style.display='none'">`).join('')}</div>`:'';
    const vhtml=p.vf?`<div style="display:flex;align-items:center;gap:4px;justify-content:center;margin-top:5px"><span style="background:#ECFDF5;color:#059669;padding:4px 12px;border-radius:18px;font-size:12px;font-weight:700">✓ 인증 전문가</span></div>`:'';

    // 리뷰 작성 폼
    const rvForm=li?`<div class="rv-form"><div style="font-size:14px;font-weight:700;margin-bottom:8px;color:var(--tx)">✏️ 리뷰 작성</div><div class="rv-stars-sel" id="rv-stars">${[1,2,3,4,5].map(i=>`<button class="rv-star" onclick="setRvSc(${i})" style="color:var(--mu)">★</button>`).join('')}</div><textarea class="rv-ta" id="rv-text" placeholder="방문 후기를 작성해주세요..."></textarea><button class="rv-submit" onclick="submitRv(${p.id})">리뷰 등록</button></div>`:`<div style="margin:0 18px 14px;padding:14px;background:var(--bg2);border-radius:10px;text-align:center;font-size:13px;color:var(--mu)">리뷰를 작성하려면 로그인해주세요</div>`;

    $('mbody').innerHTML=`
      <div style="text-align:center;padding:20px 0 6px"><div style="font-size:44px;margin-bottom:6px">${p.ic}</div><div style="display:flex;align-items:center;justify-content:center;gap:5px"><span style="font-size:11px;font-weight:600;color:${c.c};background:${cbg(p.cat)};padding:3px 10px;border-radius:10px">${c.l}</span><span style="font-size:12px;color:var(--mu)">${p.sp} · ${p.exp}</span></div>${vhtml}</div>
      <div style="margin:12px 18px;background:linear-gradient(135deg,${c.c}08,${c.c}15);border-radius:14px;padding:16px;display:flex;align-items:center;gap:14px"><div style="text-align:center"><div style="font-size:36px;font-weight:800;color:${c.c};line-height:1">${p.rt}</div>${st(p.rt,14)}<div style="font-size:11px;color:var(--mu);margin-top:2px">리뷰 ${p.rv.toLocaleString()}개</div></div><div style="flex:1">${[10,8,6,4,2].map(s=>`<div style="display:flex;align-items:center;gap:3px;margin-bottom:2px"><span style="font-size:10px;color:var(--mu);width:16px;text-align:right">${s}+</span><div style="flex:1;height:3px;background:var(--bd2);border-radius:2px;overflow:hidden"><div style="width:${s>=8?70:s>=6?18:s>=4?8:4}%;height:100%;background:${c.c}"></div></div></div>`).join('')}</div></div>
      ${gal}
      <div class="ig">${[["👤","전문가",p.sp],["⏰","경력",p.exp],["💰","상담비",p.prl],["📞","전화",p.ph],["🕐","영업",p.hrs],["📅","휴무",p.cls]].map(([ic,lb,vl])=>`<div class="ii"><div class="il">${ic} ${lb}</div><div class="iv">${vl}</div></div>`).join('')}</div>
      <div class="ab"><span style="font-size:13px;flex:1;color:var(--tx)">📍 ${p.addr}</span><button class="cpb" onclick="navigator.clipboard&&navigator.clipboard.writeText('${p.addr}');toast('복사됨')">복사</button></div>
      <div style="margin:0 18px 12px;background:var(--bg2);border-radius:10px;padding:13px"><div style="font-size:13px;font-weight:600;margin-bottom:4px;color:var(--tx)">소개</div><div style="font-size:13px;color:var(--tx2);line-height:1.7">${p.desc}</div></div>
      <div style="margin:0 18px 12px;display:flex;flex-wrap:wrap;gap:4px">${p.tags.map(t=>`<span class="tg">#${t}</span>`).join('')}</div>
      ${rv.length?`<div style="margin:0 18px 12px"><div style="font-size:14px;font-weight:700;margin-bottom:8px;color:var(--tx)">리뷰 (${rv.length})</div>${rv.map(r=>`<div class="rvc"><div style="display:flex;justify-content:space-between;margin-bottom:4px"><div style="display:flex;align-items:center;gap:5px"><span style="font-size:13px;font-weight:700;color:var(--tx)">${r.au}</span>${st(r.sc,11)}${r.vf?'<span class="rvb">✓ 실결제</span>':''}</div><span style="font-size:11px;color:var(--mu)">${r.dt}</span></div><div style="font-size:12px;color:var(--tx2);line-height:1.5">${r.tx}</div>${r.hl!==undefined&&r.hl>0?`<div style="font-size:11px;color:var(--mu);margin-top:3px">👍 ${r.hl}</div>`:''}</div>`).join('')}</div>`:''} 
      ${rvForm}`;
    $('mfoot').innerHTML=`<button class="btn btn-o" onclick="toast('전화 연결 중...')">📞 전화</button><button class="btn" style="flex:2;background:${c.c};color:#fff" onclick="startB()">📅 예약하기</button>`;
    // restore star UI
    setTimeout(()=>updStars(),50);
  } else rbv();
}

// Review star selection
window.setRvSc=function(n){rvScore=n;updStars();};
function updStars(){const el=$('rv-stars');if(!el)return;el.querySelectorAll('.rv-star').forEach((b,i)=>{b.style.color=i<rvScore?'#FACC15':'var(--mu)';});}
window.submitRv=function(pid){
  const tx=$('rv-text').value.trim();
  if(!rvScore)return toast('별점을 선택해주세요');
  if(!tx)return toast('리뷰 내용을 입력해주세요');
  const td=new Date();const ds=`${td.getFullYear()}.${String(td.getMonth()+1).padStart(2,'0')}.${String(td.getDate()).padStart(2,'0')}`;
  myRv.push({pid,sc:rvScore*2,tx,dt:ds});
  rvScore=0;toast('리뷰가 등록되었습니다!');rmod();
};

// ═══════ BOOKING ═══════
window.startB=function(){if(!li){toast('로그인 필요');closeM();sw('my');return;}mm='booking';cvm=new Date();csel=new Date();btm=null;rmod();};
function rbv(){const p=cp2;payMethod='card';$('mbody').innerHTML=`<div style="padding:14px 18px 6px"><h3 style="font-size:15px;font-weight:700;color:var(--tx)">📅 날짜 선택</h3></div><div id="calb"></div><div style="padding:10px 18px 6px"><h3 style="font-size:14px;font-weight:700;color:var(--tx)">⏰ 시간 선택</h3></div><div class="tgd" id="tgd"></div><div class="bf" id="bfm"><h3 style="font-size:14px;font-weight:700;margin-bottom:8px;color:var(--tx)">예약자 정보</h3><input class="fi" id="bn" placeholder="이름"><input class="fi" id="bp" placeholder="전화번호 (- 제외)"><h3 style="font-size:14px;font-weight:700;margin:12px 0 8px;color:var(--tx)">💳 결제 수단</h3><div class="pm-grid" id="pmg"><div class="pm-btn on" data-m="card"><span class="pm-ic">💳</span><span class="pm-lb">신용카드</span></div><div class="pm-btn" data-m="kakaopay"><span class="pm-ic">🟡</span><span class="pm-lb">카카오페이</span></div><div class="pm-btn" data-m="tosspay"><span class="pm-ic">🔵</span><span class="pm-lb">토스페이</span></div><div class="pm-btn" data-m="naverpay"><span class="pm-ic">🟢</span><span class="pm-lb">네이버페이</span></div></div><div style="background:var(--bg2);border-radius:10px;padding:13px;margin-top:4px"><div style="display:flex;justify-content:space-between;margin-bottom:5px"><span style="font-size:13px;color:var(--sub)">상담비</span><span style="font-size:14px;font-weight:700;color:var(--tx)">${p.prl}</span></div><div style="display:flex;justify-content:space-between"><span style="font-size:13px;color:var(--sub)">결제수단</span><span style="font-size:13px;font-weight:600;color:var(--pri)" id="pm-label">신용카드</span></div></div><div style="margin-top:8px;padding:10px;background:#FEF3C7;border-radius:8px;font-size:11px;color:#92400E;text-align:center;line-height:1.4">🔒 포트원 테스트 모드 · 실제 결제되지 않습니다</div></div>`;rcl();rtg();
  // 결제수단 선택 이벤트
  $('pmg').onclick=function(e){const b=e.target.closest('.pm-btn');if(!b)return;payMethod=b.dataset.m;this.querySelectorAll('.pm-btn').forEach(x=>x.classList.remove('on'));b.classList.add('on');const labels={card:'신용카드',kakaopay:'카카오페이',tosspay:'토스페이',naverpay:'네이버페이'};$('pm-label').textContent=labels[payMethod];};
  $('mfoot').innerHTML=`<button class="btn btn-b" style="flex:1" onclick="cfB()">💳 ${p.prl} 결제하기</button>`;}
function rcl(){const y=cvm.getFullYear(),m=cvm.getMonth(),fd=new Date(y,m,1).getDay(),dim=new Date(y,m+1,0).getDate(),td=new Date();td.setHours(0,0,0,0);let d='';for(let i=0;i<fd;i++)d+='<div></div>';for(let i=1;i<=dim;i++){const dt=new Date(y,m,i);dt.setHours(0,0,0,0);const isT=dt.getTime()===td.getTime(),isS=csel&&dt.toDateString()===csel.toDateString(),isP=dt<td;d+=`<div class="cd${isT&&!isS?' today':''}${isS?' sel':''}${isP?' dis':''}" ${!isP?`onclick="selD(${y},${m},${i})"`:''} >${i}</div>`;}$('calb').innerHTML=`<div class="cal-h"><button class="cal-n" onclick="cvm.setMonth(cvm.getMonth()-1);rcl()">❮</button><div class="cal-m">${y}년 ${m+1}월</div><button class="cal-n" onclick="cvm.setMonth(cvm.getMonth()+1);rcl()">❯</button></div><div class="cal-w">${['일','월','화','수','목','금','토'].map((x,i)=>`<div style="color:${i===0?'var(--red)':i===6?'var(--taro)':''}">${x}</div>`).join('')}</div><div class="cal-d">${d}</div>`;}
window.selD=(y,m,d)=>{csel=new Date(y,m,d);btm=null;rcl();rtg();const bf=$('bfm');if(bf)bf.classList.remove('on');};
function rtg(){const el=$('tgd');if(!el)return;el.innerHTML=["09:00","10:00","11:00","12:00","13:00","14:00","15:00","16:00","17:00","18:00","19:00","20:00"].map(t=>`<button class="tb${btm===t?' on':''}" onclick="selT('${t}')">${t}</button>`).join('');}
window.selT=t=>{btm=t;rtg();const bf=$('bfm');if(bf)bf.classList.add('on');$('mbody').scrollTo({top:$('mbody').scrollHeight,behavior:'smooth'});};
window.cfB=function(){
  if(!csel||!btm)return toast('날짜·시간 선택');
  const nm=$('bn').value,ph=$('bp').value;
  if(!nm||!ph)return toast('정보 입력 필요');
  if(!nm.trim())return toast('이름을 입력해주세요');
  if(!/^\d{10,11}$/.test(ph.replace(/-/g,'')))return toast('올바른 전화번호를 입력해주세요');

  const p=cp2;
  const ds=`${csel.getFullYear()}-${String(csel.getMonth()+1).padStart(2,'0')}-${String(csel.getDate()).padStart(2,'0')}`;
  const orderId='ORD_'+Date.now();
  const pgMap={card:'html5_inicis',kakaopay:'kakaopay',tosspay:'tosspay',naverpay:'naverpay'};
  const methodMap={card:'card',kakaopay:'kakaopay',tosspay:'tosspay',naverpay:'naverpay'};

  // 포트원 결제 요청
  initIMP();
  if(!window.IMP||!window._impReady){
    // SDK 로드 실패 시 폴백 (데모 모드)
    toast('⚠️ 결제 SDK 로드 중... 데모 모드로 진행');
    demoPayComplete(p,ds,nm,ph,orderId);
    return;
  }

  toast('결제창을 불러오는 중...');

  window.IMP.request_pay({
    pg: pgMap[payMethod],
    pay_method: methodMap[payMethod],
    merchant_uid: orderId,
    name: p.n + ' ' + CT[p.cat].l + ' 상담',
    amount: p.pr,
    buyer_name: nm,
    buyer_tel: ph.replace(/-/g,''),
    buyer_email: 'test@unmyeong.kr',
    // 모바일 결제 후 돌아올 URL (현재 페이지)
    m_redirect_url: window.location.href
  }, function(rsp){
    if(rsp.success){
      // ✅ 결제 성공
      paySuccess(p,ds,nm,ph,orderId,rsp);
    } else {
      // ❌ 결제 실패/취소
      payFail(rsp);
    }
  });
};

// 결제 성공 처리
function paySuccess(p,ds,nm,ph,orderId,rsp){
  const td=new Date();
  const tdStr=`${td.getFullYear()}-${String(td.getMonth()+1).padStart(2,'0')}-${String(td.getDate()).padStart(2,'0')}`;
  const labels={card:'신용카드',kakaopay:'카카오페이',tosspay:'토스페이',naverpay:'네이버페이'};

  // 예약 등록
  res.push({id:orderId.slice(-8),pid:p.id,n:p.n,dt:ds,tm:btm,pr:p.prl,st:'active'});
  // 결제 등록 (imp_uid 포함)
  pay.push({id:rsp.imp_uid||orderId,n:p.n,dt:tdStr,pr:p.prl,mt:labels[payMethod]||'카드',imp_uid:rsp.imp_uid,merchant_uid:rsp.merchant_uid});

  // 결제 성공 화면 표시
  $('mbody').innerHTML=`
    <div class="pay-result">
      <div class="pay-ok">✅</div>
      <div style="font-size:20px;font-weight:800;color:var(--tx);margin-bottom:4px">결제 완료!</div>
      <div style="font-size:14px;color:var(--sub);margin-bottom:16px">예약이 확정되었습니다</div>
      <div style="background:var(--sf);border-radius:12px;padding:16px;text-align:left;border:1px solid var(--bd)">
        <div style="display:flex;justify-content:space-between;margin-bottom:8px"><span style="font-size:13px;color:var(--sub)">상호</span><span style="font-size:14px;font-weight:700;color:var(--tx)">${p.ic} ${p.n}</span></div>
        <div style="display:flex;justify-content:space-between;margin-bottom:8px"><span style="font-size:13px;color:var(--sub)">일시</span><span style="font-size:14px;font-weight:600;color:var(--tx)">${ds} ${btm}</span></div>
        <div style="display:flex;justify-content:space-between;margin-bottom:8px"><span style="font-size:13px;color:var(--sub)">예약자</span><span style="font-size:14px;font-weight:600;color:var(--tx)">${nm}</span></div>
        <div style="display:flex;justify-content:space-between;margin-bottom:8px"><span style="font-size:13px;color:var(--sub)">결제수단</span><span style="font-size:14px;font-weight:600;color:var(--tx)">${labels[payMethod]||'카드'}</span></div>
        <div style="display:flex;justify-content:space-between;border-top:1px solid var(--bd);padding-top:8px;margin-top:4px"><span style="font-size:14px;font-weight:700;color:var(--sub)">결제금액</span><span style="font-size:18px;font-weight:800;color:var(--pri)">${p.prl}</span></div>
      </div>
      <div style="margin-top:12px;padding:10px;background:#ECFDF5;border-radius:8px;font-size:12px;color:#059669;line-height:1.4">
        📱 예약 확인 문자가 ${ph}로 발송됩니다<br>
        🔖 주문번호: ${rsp.merchant_uid||orderId}
      </div>
      ${rsp.imp_uid?`<div style="margin-top:6px;font-size:11px;color:var(--mu)">imp_uid: ${rsp.imp_uid}</div>`:''}
    </div>`;
  $('mfoot').innerHTML=`<button class="btn btn-b" style="flex:1" onclick="closeM();sw('my')">확인</button>`;
  $('mfav').style.display='none';
  $('mback').style.display='none';
  $('mtitle').textContent='결제 완료';
}

// 결제 실패 처리
function payFail(rsp){
  const msg=rsp.error_msg||'결제가 취소되었습니다';
  $('mbody').innerHTML=`
    <div class="pay-result">
      <div class="pay-fail">❌</div>
      <div style="font-size:20px;font-weight:800;color:var(--tx);margin-bottom:4px">결제 실패</div>
      <div style="font-size:14px;color:var(--sub);margin-bottom:16px">${msg}</div>
      <div style="padding:12px;background:#FEF2F2;border-radius:10px;font-size:12px;color:#DC2626;line-height:1.5">
        결제가 완료되지 않았습니다.<br>다시 시도하거나 다른 결제수단을 선택해주세요.
      </div>
    </div>`;
  $('mfoot').innerHTML=`<button class="btn btn-o" style="flex:1" onclick="mm='booking';rmod()">다시 시도</button><button class="btn btn-b" style="flex:1" onclick="closeM()">닫기</button>`;
}

// SDK 로드 실패 시 데모 결제
function demoPayComplete(p,ds,nm,ph,orderId){
  const rsp={success:true,imp_uid:'imp_demo_'+Date.now(),merchant_uid:orderId};
  setTimeout(()=>paySuccess(p,ds,nm,ph,orderId,rsp),800);
}

// ═══════ INIT ═══════
rfilt();rmap();rnav();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>운명지도</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.iamport.kr/v1/iamport.js" async></script>
<style>
:root{--pri:#6B4EFF;--bg:#fff;--bg2:#F8FAFC;--bg3:#F1F5F9;--sf:#fff;--tx:#0F172A;--tx2:#475569;--sub:#64748B;--mu:#94A3B8;--bd:#F1F5F9;--bd2:#E2E8F0;--red:#EF4444;--sh:0 2px 8px rgba(0,0,0,.06);--ov:rgba(0,0,0,.5)}
[data-theme="dark"]{--pri:#9B85FF;--bg:#0A0D1C;--bg2:#0F1328;--bg3:#171C38;--sf:#111530;--tx:#E4E2F0;--tx2:#A09CC0;--sub:#706C98;--mu:#504C78;--bd:#1A1F3A;--bd2:#252B50;--sh:0 2px 12px rgba(0,0,0,.4);--ov:rgba(4,4,16,.88)}
[data-theme="dark"] .leaflet-tile-pane{filter:brightness(.6) contrast(1.15) saturate(.7) hue-rotate(210deg)}
[data-theme="dark"] .leaflet-control-zoom a{background:var(--bg3)!important;color:var(--tx)!important;border-color:var(--bd2)!important}
*{box-sizing:border-box;margin:0;padding:0;font-family:'Pretendard',-apple-system,sans-serif}
html,body{height:100%;overflow:hidden;background:#0A0D1C}
body{display:flex;justify-content:center}
::-webkit-scrollbar{width:0;height:0}
#app{display:flex;flex-direction:column;height:100dvh;width:100%;max-width:480px;background:var(--bg);position:relative;box-shadow:0 0 40px rgba(0,0,0,.2);overflow:hidden;transition:background .35s}
/* 스플래시 로딩 화면 */
#splash{position:fixed;top:0;left:0;right:0;bottom:0;background:linear-gradient(135deg,#0A0D1C 0%,#1a1040 50%,#0A0D1C 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999999;transition:opacity .6s,visibility .6s}
#splash.hide{opacity:0;visibility:hidden;pointer-events:none}
#splash .sp-icon{font-size:64px;animation:spPulse 1.5s ease-in-out infinite}
#splash .sp-title{font-size:28px;font-weight:900;color:#fff;margin-top:14px;letter-spacing:-1px}
#splash .sp-sub{font-size:13px;color:#9B85FF;margin-top:8px;opacity:.8}
#splash .sp-dots{margin-top:28px;display:flex;gap:8px}
#splash .sp-dot{width:8px;height:8px;border-radius:50%;background:#6B4EFF;animation:spDot 1.2s ease-in-out infinite}
#splash .sp-dot:nth-child(2){animation-delay:.2s}
#splash .sp-dot:nth-child(3){animation-delay:.4s}
@keyframes spPulse{0%,100%{transform:scale(1);filter:brightness(1)}50%{transform:scale(1.15);filter:brightness(1.4) drop-shadow(0 0 20px rgba(107,78,255,.6))}}
@keyframes spDot{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1.2)}}
.hd{height:50px;min-height:50px;padding:0 16px;background:var(--sf);display:flex;align-items:center;border-bottom:1px solid var(--bd);z-index:100;transition:all .35s}
.hd-logo{display:flex;align-items:center;gap:8px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.hd-t{font-size:19px;font-weight:800;background:linear-gradient(135deg,var(--pri),#E85D3A);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.thm{background:none;border:none;font-size:20px;cursor:pointer;padding:6px;border-radius:8px;line-height:1;margin-left:auto}
.bnav{height:58px;min-height:58px;background:var(--sf);border-top:1px solid var(--bd);display:flex;justify-content:space-around;align-items:center;z-index:100;transition:all .35s}
.nv{display:flex;flex-direction:column;align-items:center;gap:2px;color:var(--sub);font-size:11px;font-weight:500;cursor:pointer;background:none;border:none;position:relative;padding:4px 14px}.nv.on{color:var(--pri);font-weight:700}
.nv-ic{font-size:20px}.nv-bg{position:absolute;top:0;right:4px;background:var(--red);color:#fff;font-size:8px;font-weight:700;min-width:14px;height:14px;border-radius:7px;display:flex;align-items:center;justify-content:center;padding:0 3px}
.ct{flex:1 1 0;min-height:0;position:relative;overflow:hidden}
.vw{position:absolute;inset:0;display:none;flex-direction:column;overflow:hidden}.vw.on{display:flex}
.flt{background:var(--sf);border-bottom:1px solid var(--bd);flex-shrink:0;padding:6px 10px 4px;transition:all .35s}
.frow{display:flex;gap:5px;margin-bottom:4px;overflow-x:auto;white-space:nowrap}
.rgrid{display:flex;flex-wrap:wrap;gap:4px 5px;margin-bottom:4px}
.fb{padding:6px 14px;border-radius:20px;border:none;font-size:12px;font-weight:600;cursor:pointer;background:var(--bg3);color:var(--sub);transition:all .15s;flex-shrink:0}.fb.on{color:#fff}
.rb{padding:5px 10px;border-radius:8px;border:1px solid var(--bd2);background:var(--sf);color:var(--sub);font-size:11px;font-weight:600;cursor:pointer;flex-shrink:0;transition:all .15s}.rb.on{background:var(--tx);color:var(--bg);border-color:var(--tx)}
.pb{padding:5px 10px;border-radius:8px;border:1px solid var(--bd2);background:var(--sf);color:var(--sub);font-size:11px;font-weight:600;cursor:pointer;flex-shrink:0;transition:all .15s}.pb.on{background:var(--pri);color:#fff;border-color:var(--pri)}
.ma{flex:1 1 0;min-height:0;position:relative}
/* GPS 내위치 버튼 */
.gps-btn{position:absolute;bottom:16px;right:12px;z-index:800;width:44px;height:44px;border-radius:50%;background:var(--sf);border:1.5px solid var(--bd2);box-shadow:0 2px 10px rgba(0,0,0,.15);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:20px;transition:.2s;color:var(--tx)}
.gps-btn:active{transform:scale(.9)}
.gps-btn.on{border-color:var(--pri);color:var(--pri);background:var(--bg);box-shadow:0 2px 12px rgba(107,78,255,.3)}
.gps-btn.loading{animation:gpsSpin 1s linear infinite}
@keyframes gpsSpin{to{transform:rotate(360deg)}}
/* 내 위치 파란 점 */
.my-loc{width:16px;height:16px;background:#4285F4;border:3px solid #fff;border-radius:50%;box-shadow:0 0 0 6px rgba(66,133,244,.2),0 2px 6px rgba(0,0,0,.2)}
.my-loc::after{content:'';position:absolute;inset:-6px;border-radius:50%;background:rgba(66,133,244,.15);animation:locPulse 2s ease-out infinite}
@keyframes locPulse{0%{transform:scale(.8);opacity:.6}100%{transform:scale(2.2);opacity:0}}
#map{position:absolute;top:0;left:0;width:100%;height:100%}
.mbg{position:absolute;top:8px;left:8px;background:var(--sf);border-radius:12px;padding:8px 12px;box-shadow:var(--sh);z-index:500;font-size:13px;font-weight:700;color:var(--tx);pointer-events:none;border:1px solid var(--bd);transition:all .35s;line-height:1.6}
.mbg .mc2{display:inline-flex;align-items:center;gap:3px;margin-right:6px;font-size:12px;font-weight:700}.mbg .mc2 i{width:8px;height:8px;border-radius:50%;display:inline-block}
.leaflet-popup-content-wrapper{border-radius:14px!important;padding:0!important;box-shadow:0 4px 20px rgba(0,0,0,.15)!important;border:1px solid var(--bd2)!important;background:var(--sf)!important}
.leaflet-popup-content{margin:0!important;width:auto!important;min-width:230px;max-width:280px}.leaflet-popup-tip{display:none}
.cm{border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 12px rgba(0,0,0,.3);border:2.5px solid #fff;cursor:pointer;transition:transform .2s}.cm:hover{transform:scale(1.15)}
.vb{display:inline-flex;align-items:center;gap:2px;font-size:10px;font-weight:700;color:#059669;background:#ECFDF5;padding:2px 8px;border-radius:8px;white-space:nowrap}
[data-theme="dark"] .vb{background:#0D2818;color:#34D399}
.rvb{display:inline-flex;align-items:center;gap:2px;font-size:10px;font-weight:700;color:var(--pri);background:#EDE9FE;padding:2px 7px;border-radius:7px}
[data-theme="dark"] .rvb{background:#1A1540;color:#A78BFA}
.sw{padding:12px;background:var(--sf);border-bottom:1px solid var(--bd);flex-shrink:0}
.sinp{width:100%;padding:11px 16px;border:2px solid var(--pri);border-radius:12px;font-size:15px;font-weight:600;outline:none;background:var(--bg2);color:var(--tx);transition:all .35s}
.stag{padding:6px 13px;background:var(--bg2);border:1px solid var(--bd);border-radius:20px;font-size:13px;cursor:pointer;display:inline-block;margin:0 5px 7px 0;color:var(--tx)}
.si{padding:13px 14px;border-bottom:1px solid var(--bd);cursor:pointer;display:flex;align-items:center;gap:12px}.si:active{background:var(--bg2)}
.si-ic{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.wc{margin:0 14px 10px;background:var(--sf);border-radius:14px;padding:14px;border:1px solid var(--bd);display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .35s}
.rc{background:var(--sf);border-radius:14px;padding:16px;margin:0 14px 10px;border:1px solid var(--bd);transition:all .35s}
.pc{margin:0 14px 10px;background:var(--sf);border-radius:12px;padding:14px;border:1px solid var(--bd);transition:all .35s}
.rs{padding:3px 10px;border-radius:6px;font-size:11px;font-weight:700}
.rs.active{background:#EFF6FF;color:var(--pri)}[data-theme="dark"] .rs.active{background:#151A40}
.rs.completed{background:var(--bg3);color:var(--sub)}.rs.cancelled{background:#FEF2F2;color:var(--red)}[data-theme="dark"] .rs.cancelled{background:#200F15}
.sb{width:100%;max-width:320px;padding:14px;border-radius:12px;font-size:15px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:10px;cursor:pointer;border:none;transition:.15s}.sb:active{transform:scale(.97)}
.sn{background:#03C75A;color:#fff}.sk{background:#FEE500;color:#000}.sg{background:var(--sf);color:var(--tx);border:1px solid var(--bd2)}.sa{background:#000;color:#fff}
#mo{position:fixed;inset:0;background:var(--ov);z-index:1000;display:none;align-items:flex-end;justify-content:center}#mo.on{display:flex}
.modal-c{background:var(--sf);width:100%;max-width:480px;max-height:88vh;border-radius:20px 20px 0 0;display:flex;flex-direction:column;animation:mu .25s ease-out;transition:background .35s}
@keyframes mu{from{transform:translateY(100%)}to{transform:translateY(0)}}
.mh{display:flex;align-items:center;padding:12px 16px;border-bottom:1px solid var(--bd);gap:8px}
.mh .mt{flex:1;text-align:center;font-size:16px;font-weight:800;color:var(--tx)}
.cb{background:var(--bg3);border:none;border-radius:50%;width:32px;height:32px;font-size:14px;cursor:pointer;color:var(--sub);display:flex;align-items:center;justify-content:center}
.fvb{background:none;border:none;font-size:22px;cursor:pointer}
.mb{flex:1;overflow-y:auto;background:var(--bg);transition:background .35s}
.mf{padding:10px 14px;border-top:1px solid var(--bd);display:flex;gap:8px;background:var(--sf)}
.btn{flex:1;padding:13px;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;text-align:center;border:none;transition:.15s}.btn:active{transform:scale(.97)}
.btn-o{background:var(--bg2);color:var(--tx);border:1px solid var(--bd2)}
.btn-b{background:#000;color:#fff}[data-theme="dark"] .btn-b{background:var(--pri);color:#fff}
.gal{display:flex;gap:8px;padding:0 18px 14px;overflow-x:auto}.gal img{width:120px;height:88px;border-radius:12px;object-fit:cover;flex-shrink:0;border:1px solid var(--bd2);cursor:pointer;transition:transform .2s}.gal img:hover{transform:scale(1.03)}
.ig{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:0 18px 14px}
.ii{background:var(--bg2);border-radius:10px;padding:12px;transition:all .35s}.il{font-size:11px;color:var(--mu);margin-bottom:2px}.iv{font-size:13px;font-weight:600;color:var(--tx)}
.ab{display:flex;align-items:center;background:var(--bg2);padding:11px 14px;border-radius:10px;margin:0 18px 14px;border:1px solid var(--bd2);gap:8px}
.cpb{background:var(--sf);border:1px solid var(--bd2);padding:5px 10px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;color:var(--sub);white-space:nowrap}
.tg{font-size:11px;color:var(--sub);background:var(--bg3);padding:4px 10px;border-radius:8px;display:inline-block;margin:0 4px 4px 0}
.rvc{background:var(--bg2);border-radius:10px;padding:13px;margin-bottom:8px;transition:all .35s}
.rv-form{background:var(--bg2);border-radius:12px;padding:16px;margin:0 18px 14px;border:1px solid var(--bd2)}
.rv-stars-sel{display:flex;gap:4px;margin-bottom:10px}
.rv-star{font-size:28px;cursor:pointer;background:none;border:none;padding:0;transition:transform .15s}.rv-star:hover{transform:scale(1.2)}
.rv-ta{width:100%;padding:12px;border:1px solid var(--bd2);border-radius:10px;font-size:14px;outline:none;background:var(--sf);color:var(--tx);resize:none;min-height:80px;transition:all .35s;font-family:inherit}
.rv-submit{width:100%;padding:12px;border-radius:10px;border:none;background:var(--pri);color:#fff;font-size:14px;font-weight:700;cursor:pointer;margin-top:8px}
.sort-tabs{display:flex;margin:12px 18px;background:var(--bg3);border-radius:10px;overflow:hidden;border:1px solid var(--bd)}
.sort-tab{flex:1;padding:10px;border:none;font-size:13px;font-weight:700;cursor:pointer;transition:.2s;background:transparent;color:var(--sub)}.sort-tab.on{background:var(--pri);color:#fff}
.pm-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.pm-btn{padding:12px 8px;border:2px solid var(--bd2);border-radius:12px;background:var(--sf);cursor:pointer;text-align:center;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:4px}.pm-btn.on{border-color:var(--pri);background:var(--bg2)}.pm-btn:active{transform:scale(.97)}
.cal-h{display:flex;justify-content:space-between;align-items:center;padding:0 18px;margin-bottom:10px}
.cal-n{background:none;border:none;font-size:18px;color:var(--pri);cursor:pointer;padding:4px 12px}
.cal-m{font-size:16px;font-weight:700;color:var(--tx)}
.cal-w{display:grid;grid-template-columns:repeat(7,1fr);text-align:center;font-size:12px;font-weight:600;color:var(--mu);margin-bottom:6px;padding:0 18px}
.cal-d{display:grid;grid-template-columns:repeat(7,1fr);gap:3px 0;text-align:center;padding:0 18px;margin-bottom:14px}
.cd{width:32px;height:32px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer;transition:.15s;margin:0 auto;color:var(--tx)}
.cd.today{color:var(--red);font-weight:700}.cd.sel{background:var(--pri);color:#fff;font-weight:700}.cd.dis{color:var(--mu);cursor:not-allowed;text-decoration:line-through}
.tgd{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:0 18px 14px}
.tb{padding:11px;border:1px solid var(--bd2);border-radius:10px;background:var(--sf);font-size:14px;font-weight:600;cursor:pointer;text-align:center;color:var(--tx);transition:.15s}.tb.on{background:var(--pri);color:#fff;border-color:var(--pri)}
.bf{padding:0 18px 18px;display:none}.bf.on{display:block}
.fi{width:100%;padding:12px;border:1px solid var(--bd2);border-radius:10px;margin-bottom:8px;font-size:14px;outline:none;background:var(--bg2);color:var(--tx);transition:all .35s}
.pay-result{background:var(--bg2);border-radius:14px;padding:20px;margin:20px 18px;text-align:center;border:1px solid var(--bd2)}
#toast{position:fixed;bottom:72px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--tx);color:var(--bg);padding:10px 22px;border-radius:12px;font-size:14px;font-weight:600;z-index:9999;opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap}#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
.st{color:#FACC15}.sto{color:var(--mu)}

/* ═══ 홍보 패널 ═══ */
.ad-panel{position:relative;z-index:90;background:var(--sf);border-top:1px solid var(--bd);transition:all .35s;overflow:hidden}
.ad-peek{position:relative;cursor:pointer;padding:10px 14px 6px;overflow:hidden;-webkit-tap-highlight-color:transparent}
.ad-shimmer{position:absolute;inset:0;background:linear-gradient(110deg,transparent 30%,rgba(107,78,255,.06) 50%,transparent 70%);background-size:200% 100%;animation:adShimmer 3s ease-in-out infinite}
@keyframes adShimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.ad-peek-inner{display:flex;gap:10px;align-items:center;position:relative;z-index:1}
.ad-peek-img{width:52px;height:52px;border-radius:12px;object-fit:cover;border:2px solid var(--pri);flex-shrink:0;animation:adGlow 2.5s ease-in-out infinite}
@keyframes adGlow{0%,100%{box-shadow:0 0 4px rgba(107,78,255,.3)}50%{box-shadow:0 0 14px rgba(107,78,255,.6)}}
.ad-peek-info{flex:1;min-width:0}
.ad-peek-name{font-size:14px;font-weight:800;color:var(--tx);display:flex;align-items:center;gap:5px}
.ad-peek-name .ad-badge{font-size:9px;font-weight:700;color:#fff;background:linear-gradient(135deg,var(--pri),#E85D3A);padding:2px 7px;border-radius:6px;animation:adPulse 2s ease-in-out infinite;white-space:nowrap}
@keyframes adPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.85;transform:scale(1.05)}}
.ad-peek-loc{font-size:11px;color:var(--sub);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ad-peek-desc{font-size:12px;color:var(--tx2);margin-top:2px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical}
.ad-handle{display:flex;align-items:center;justify-content:center;gap:6px;padding:5px 0 2px;position:relative;z-index:1}
.ad-handle-dot{width:3px;height:3px;border-radius:50%;background:var(--pri);animation:adPulse 2s ease-in-out infinite}
.ad-label{font-size:10px;font-weight:700;color:var(--pri);letter-spacing:.5px}

/* 펼침 상태 */
.ad-panel.open .ad-full{max-height:70vh;padding:0 14px 14px;opacity:1}
.ad-panel.open .ad-peek-inner{display:none}
.ad-panel.open .ad-shimmer{display:none}
.ad-panel.open .ad-label::after{content:'  ▼'}
.ad-panel:not(.open) .ad-label::after{content:'  ▲'}
.ad-full{max-height:0;opacity:0;overflow-y:auto;transition:max-height .4s cubic-bezier(.4,0,.2,1),opacity .3s,padding .3s;padding:0 14px}
.ad-card{display:flex;gap:10px;padding:12px;background:var(--bg2);border-radius:12px;margin-bottom:8px;cursor:pointer;border:1px solid var(--bd);transition:all .2s;position:relative;overflow:hidden}
.ad-card:active{transform:scale(.98)}
.ad-card::before{content:'';position:absolute;inset:0;background:linear-gradient(110deg,transparent 40%,rgba(107,78,255,.04) 55%,transparent 70%);background-size:250% 100%;animation:adShimmer 4s ease-in-out infinite}
.ad-card-img{width:64px;height:64px;border-radius:10px;object-fit:cover;flex-shrink:0;border:1px solid var(--bd2);position:relative;z-index:1}
.ad-card-body{flex:1;min-width:0;position:relative;z-index:1}
.ad-card-name{font-size:14px;font-weight:800;color:var(--tx);display:flex;align-items:center;gap:5px}
.ad-card-cat{font-size:10px;font-weight:600;padding:2px 7px;border-radius:6px}
.ad-card-loc{font-size:11px;color:var(--sub);margin-top:2px}
.ad-card-desc{font-size:12px;color:var(--tx2);margin-top:3px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;line-height:1.5}
.ad-card-price{font-size:12px;font-weight:700;color:var(--pri);margin-top:3px}
.ad-rank{position:absolute;top:6px;right:8px;font-size:9px;font-weight:800;color:var(--pri);background:var(--bg);padding:2px 6px;border-radius:6px;border:1px solid var(--bd);z-index:2}
</style>
</head>
<body>
<!-- 스플래시 로딩 화면 -->
<div id="splash">
  <div class="sp-icon">🔮</div>
  <div class="sp-title">운명지도</div>
  <div class="sp-sub">당신의 운명을 찾아가는 여정</div>
  <div class="sp-dots"><div class="sp-dot"></div><div class="sp-dot"></div><div class="sp-dot"></div></div>
</div>
<div id="app" data-theme="light">
<div class="hd"><div class="hd-logo" id="hd-logo"><span style="font-size:22px">🔮</span><span class="hd-t">운명지도</span></div><button class="thm" id="thm">🌙</button></div>

// Haversine 거리 계산 (km)
function getDist(lat1,lng1,lat2,lng2){
  const R=6371,dLat=(lat2-lat1)*Math.PI/180,dLng=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function fmtDist(km){return km<1?(Math.round(km*1000))+'m':km<10?km.toFixed(1)+'km':Math.round(km)+'km';}

const SHEET_URL = 'https://script.google.com/macros/s/AKfycbwwU6-h1NAYbCa6anEdw50unEeWDLnKjkrwX6sPGsCmaOFdcfeHa8-v9x1Dy0fpXfXY/exec';

// 구글 시트 실제 컬럼 순서:
// [0]:고유ID [1]:지역 [2]:업체명 [3]:전문가명 [4]:경력 [5]:상담비표시 [6]:전화
// [7]:영업시간 [8]:휴무 [9]:주소 [10]:위도 [11]:경도 [12]:소개 [13]:태그 [14]:아이콘 [15]:사진URL

async function loadSheet(){
  if(!SHEET_URL)return;
  try{
    const res=await fetch(SHEET_URL);
    const text=await res.text();
    if(!text||text.charAt(0)==='<')return;
    const json=JSON.parse(text);
    let rows=json.data||json.values||(Array.isArray(json)?json:null);
    if(!Array.isArray(rows)||!rows.length)return;
    // 첫 데이터행 찾기 (헤더 건너뛰기)
    const h=rows[0];
    const start=(typeof h[1]==='string'&&(h[1].includes('지역')||h[1].includes('업체')))||(typeof h[2]==='string'&&h[2].includes('업체'))?1:0;
    // 컬럼 오프셋 자동감지: A열이 숫자(고유ID)면 +1 밀림
    const firstData=rows[start];
    const off=(typeof firstData[0]==='number'||(!isNaN(Number(firstData[0]))&&String(firstData[0]).length<5))?1:0;
    // off=1이면: [0]고유ID [1]지역 [2]업체명 ...
    // off=0이면: [0]지역 [1]업체명 [2]전문가명 ...
    let maxId=Math.max(...D.map(d=>d.id));
    let added=0;
    function guessCat(nm,ds,tg){
      const a=(nm+' '+ds+' '+tg).toLowerCase();
      if(a.includes('신점')||a.includes('보살')||a.includes('무당')||a.includes('신당'))return'sinjeom';
      if(a.includes('타로')||a.includes('카드'))return'tarot';
      if(a.includes('관상')||a.includes('얼굴')||a.includes('인상'))return'gwansang';
      return'saju';
    }
    const rgMap={'일산':'경기','분당':'경기','수원':'경기','고양':'경기','성남':'경기','용인':'경기','파주':'경기','양평':'경기','부천':'경기','안양':'경기','화성':'경기','평택':'경기','이천':'경기','김포':'경기','하남':'경기','광명':'경기','시흥':'경기','안산':'경기','의정부':'경기','남양주':'경기','구리':'경기','세종':'대전','천안':'충남','청주':'충북','춘천':'강원','속초':'강원','강릉':'강원','원주':'강원','여수':'전남','순천':'전남','목포':'전남','해남':'전남','안동':'경북','포항':'경북','경주':'경북','김해':'경남','창원':'경남','진주':'경남','통영':'경남','종로':'서울','강남':'서울','마포':'서울','홍대':'서울','이태원':'서울','용산':'서울','서면':'부산','해운대':'부산'};
    for(let i=start;i<rows.length;i++){
      const r=rows[i];if(!r||!r[off+1])continue;
      const sheetId=off?parseInt(r[0])||0:0;
      const itemId=sheetId||(++maxId);
      if(sheetId)maxId=Math.max(maxId,sheetId);
      added++;
      const O=off; // 오프셋 약자
      const rawTags=String(r[O+12]||'').replace(/#/g,'').replace(/\s+/g,',');
      const tags=rawTags.split(',').map(t=>t.trim()).filter(Boolean);
      const name=String(r[O+1]||'');
      const desc=String(r[O+11]||'');
      const cat=guessCat(name,desc,String(r[O+12]||''));
      const prStr=String(r[O+4]||'5만원');
      const prNum=parseInt(prStr.replace(/[^0-9]/g,''))||50000;
      const prFinal=prNum<1000?prNum*10000:prNum;
      const rawRg=String(r[O+0]||'서울');
      const mappedRg=rgMap[rawRg]||rawRg;
      D.push({id:itemId,n:name,cat:cat,rg:mappedRg,lat:parseFloat(r[O+9])||37.5,lng:parseFloat(r[O+10])||127.0,addr:String(r[O+8]||''),rt:8.0,rv:0,pr:prFinal,prl:prStr,sp:String(r[O+2]||''),exp:String(r[O+3]||''),desc:desc,tags:tags.length?tags:['점술'],ph:String(r[O+5]||'-'),hrs:String(r[O+6]||'10:00-18:00'),cls:String(r[O+7]||'일요일'),ic:String(r[O+13]||'🔮'),vf:0,photos:(r[O+14]&&String(r[O+14]).startsWith('http'))?String(r[O+14]).split(',').map(u=>u.trim()).filter(Boolean):[]});
      console.log('[업체] ✅ #'+itemId,name,'@'+mappedRg);
    }
    console.log('[업체] 🎉 '+added+'개 추가, 전체:'+D.length);
    rfilt();rmap();
  }catch(e){console.error('[업체]',e);}
}

// ═══ GPS 내 위치 ═══
function getMyLoc(){
  const btn=$('gpsBtn');
  if(!navigator.geolocation){toast('위치 서비스를 지원하지 않습니다');return;}
  btn.classList.add('loading');btn.textContent='⏳';
  navigator.geolocation.getCurrentPosition(pos=>{
    myLat=pos.coords.latitude;myLng=pos.coords.longitude;
    btn.classList.remove('loading');btn.classList.add('on');btn.textContent='📍';
    // 내 위치 마커
    if(myLocMarker)map.removeLayer(myLocMarker);
    myLocMarker=L.marker([myLat,myLng],{icon:L.divIcon({className:'',html:'<div class="my-loc"></div>',iconSize:[16,16],iconAnchor:[8,8]})}).addTo(map);
    myLocMarker.bindPopup('<div style="text-align:center;padding:6px;font-size:13px;font-weight:700;color:var(--tx)">📍 내 위치</div>');
    // 지역 필터에 "내 주변" 추가 (없으면)
    if(!RG.includes('내 주변'))RG.splice(1,0,'내 주변');
    cr='내 주변';rfilt();rmap();
    // 광고에 거리 정보 추가 & 가까운 순 정렬
    updateAdDist();
    map.setView([myLat,myLng],13,{animate:true});
    toast('📍 내 위치 기반으로 표시합니다');
  },err=>{
    btn.classList.remove('loading');btn.textContent='📍';
    if(err.code===1)toast('위치 권한을 허용해주세요');
    else toast('위치를 가져올 수 없습니다');
  },{enableHighAccuracy:true,timeout:8000});
}

    <div style="margin-bottom:14px"><label style="font-size:13px;font-weight:700;color:var(--tx);display:block;margin-bottom:5px">전화번호 <span style="color:var(--red)">*</span></label><input id="q-phone" class="fi" placeholder="010-0000-0000" style="margin-bottom:0"></div>

    <button onclick="submitQuestion()" style="width:100%;padding:14px;border-radius:12px;border:none;background:var(--pri);color:#fff;font-size:15px;font-weight:700;cursor:pointer;margin-top:4px">📧 질문 보내기</button>

window.submitQuestion=function(){
  const nm=$('q-name').value.trim(),ph=$('q-phone').value.trim(),tx=$('q-text').value.trim();
  if(!nm)return toast('이름을 입력해주세요');
  if(!ph)return toast('전화번호를 입력해주세요');
  if(!tx)return toast('질문 내용을 입력해주세요');
  // TODO: 이메일 자동 발송 API 연동
  console.log('[질문하기]',{name:nm,phone:ph,text:tx});
  toast('질문이 접수되었습니다!');
  myView='inquiry';rmy();
};

let regPhotos=[];
function rRegister(el){

  el.innerHTML=`<div style="padding:16px 18px;display:flex;align-items:center;gap:10px;background:var(--sf);border-bottom:1px solid var(--bd)"><button onclick="myView='inquiry';rmy()" style="background:var(--bg3);border:none;border-radius:50%;width:34px;height:34px;font-size:16px;cursor:pointer;color:var(--sub);display:flex;align-items:center;justify-content:center">←</button><span style="font-size:17px;font-weight:800;color:var(--tx)">🏢 업체 등록하기</span></div>
  <div style="padding:20px 18px">
    <div style="margin-bottom:14px"><label style="font-size:13px;font-weight:700;color:var(--tx);display:block;margin-bottom:5px">상호명 <span style="color:var(--red)">*</span></label><input id="r-name" class="fi" placeholder="업체명을 입력해주세요" style="margin-bottom:0"></div>
    <div style="margin-bottom:14px"><label style="font-size:13px;font-weight:700;color:var(--tx);display:block;margin-bottom:5px">전화번호 <span style="color:var(--red)">*</span></label><input id="r-phone" class="fi" placeholder="대표 전화번호" style="margin-bottom:0"></div>
    <div style="margin-bottom:14px"><label style="font-size:13px;font-weight:700;color:var(--tx);display:block;margin-bottom:5px">주소 <span style="color:var(--red)">*</span></label><input id="r-addr" class="fi" placeholder="업체 주소를 입력해주세요" style="margin-bottom:0"></div>
    <div style="margin-bottom:14px"><label style="font-size:13px;font-weight:700;color:var(--tx);display:block;margin-bottom:5px">카테고리 <span style="color:var(--red)">*</span></label>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px" id="r-cats">
        <button class="pm-btn" data-cat="saju" onclick="selCat(this)"><span style="font-size:18px">☰</span><span style="font-size:12px;font-weight:600;color:var(--tx)">사주</span></button>
        <button class="pm-btn" data-cat="sinjeom" onclick="selCat(this)"><span style="font-size:18px">🔮</span><span style="font-size:12px;font-weight:600;color:var(--tx)">신점</span></button>
        <button class="pm-btn" data-cat="tarot" onclick="selCat(this)"><span style="font-size:18px">🃏</span><span style="font-size:12px;font-weight:600;color:var(--tx)">타로</span></button>
        <button class="pm-btn" data-cat="gwansang" onclick="selCat(this)"><span style="font-size:18px">👁️</span><span style="font-size:12px;font-weight:600;color:var(--tx)">관상</span></button>
      </div>
    </div>

let selCatVal='';
window.selCat=function(btn){selCatVal=btn.dataset.cat;document.querySelectorAll('#r-cats .pm-btn').forEach(b=>b.classList.remove('on'));btn.classList.add('on');};
window.addPhotos=function(inp){
  const files=Array.from(inp.files).slice(0,3-regPhotos.length);
  files.forEach(f=>{if(regPhotos.length>=3)return;const url=URL.createObjectURL(f);regPhotos.push({file:f,url});});
  $('r-preview').innerHTML=regPhotos.map((p,i)=>`<div style="position:relative;flex-shrink:0"><img src="${p.url}" style="width:80px;height:80px;border-radius:12px;object-fit:cover;border:1px solid var(--bd2)"><button onclick="rmPhoto(${i})" style="position:absolute;top:-6px;right:-6px;width:20px;height:20px;border-radius:50%;background:var(--red);color:#fff;border:none;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center">✕</button></div>`).join('');
  inp.value='';
};
window.rmPhoto=function(i){regPhotos.splice(i,1);$('r-preview').innerHTML=regPhotos.map((p,j)=>`<div style="position:relative;flex-shrink:0"><img src="${p.url}" style="width:80px;height:80px;border-radius:12px;object-fit:cover;border:1px solid var(--bd2)"><button onclick="rmPhoto(${j})" style="position:absolute;top:-6px;right:-6px;width:20px;height:20px;border-radius:50%;background:var(--red);color:#fff;border:none;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center">✕</button></div>`).join('');};
window.submitRegister=function(){
  const nm=$('r-name').value.trim(),ph=$('r-phone').value.trim(),addr=$('r-addr').value.trim();
  if(!nm)return toast('상호명을 입력해주세요');
  if(!ph)return toast('전화번호를 입력해주세요');
  if(!addr)return toast('주소를 입력해주세요');
  if(!selCatVal)return toast('카테고리를 선택해주세요');
  // TODO: 이메일 자동 발송 API 연동 + 사진 첨부
  console.log('[업체등록]',{name:nm,phone:ph,addr,cat:selCatVal,photos:regPhotos.length});
  toast('업체 등록 신청이 접수되었습니다!');
  selCatVal='';regPhotos=[];myView='inquiry';rmy();
};
window.doLI=p=>{li=true;lp=p;lu=p+' 유저';try{localStorage.setItem('fm_login',JSON.stringify({name:lu,provider:p}));}catch(e){}rmy();rnav();toast(p+' 로그인 완료!');};
window.doLO=()=>{li=false;lu='';lp='';try{localStorage.removeItem('fm_login');}catch(e){}rmy();rnav();toast('로그아웃');};
window.cRes=id=>{if(!confirm('예약을 취소하시겠습니까?'))return;res=res.map(r=>r.id===id?{...r,st:'cancelled'}:r);rmy();toast('취소됨');};

// ═══ MODAL ═══
window.openD=function(id){const p=D.find(x=>x.id===id);if(!p)return;cp2=p;mm='detail';rvScore=0;map.closePopup();rmod();$('mo').classList.add('on');};
function closeM(){$('mo').classList.remove('on');cp2=null;}
$('mcl').onclick=closeM;
$('mfav').onclick=()=>{if(!cp2)return;const id=cp2.id;if(fav.includes(id)){fav=fav.filter(f=>f!==id);toast('삭제됨');}else{fav.push(id);toast('추가됨 ❤️');}$('mfav').textContent=fav.includes(id)?'❤️':'🤍';rnav();};

  if(!cp2)return;const p=cp2,c=CT[p.cat];
  $('mfav').textContent=fav.includes(p.id)?'❤️':'🤍';
  $('mfav').style.display=mm==='detail'?'block':'none';
  $('mback').style.display=mm!=='detail'?'flex':'none';
  $('mtitle').textContent=mm==='detail'?p.n:mm==='reviews'?'리뷰':'예약하기';
  $('mback').onclick=()=>{mm='detail';rmod();};

  if(mm==='detail'){
    const gal=p.photos&&p.photos.length?`<div style="padding:2px 18px 4px"><div style="font-size:13px;font-weight:700;color:var(--tx);margin-bottom:8px">📸 상담 공간</div></div><div class="gal">${p.photos.map(u=>`<img src="${u}" alt="" onerror="this.style.display='none'">`).join('')}</div>`:'';

    const rvCount=allRv.length;
    const rvAvg=rvCount?(allRv.reduce((a,r)=>a+r.sc,0)/rvCount).toFixed(1):'0';

async function loadAdSheet(){
  if(!AD_SHEET_URL)return;
  try{
    const res=await fetch(AD_SHEET_URL);const text=await res.text();
    if(!text||text.charAt(0)==='<')return;
    const json=JSON.parse(text);
    const rows=json.data||json.values||(Array.isArray(json)?json:null);
    if(!Array.isArray(rows)||!rows.length)return;
    // 헤더 감지
    const h0=String(rows[0][0]||'');
    const start=(h0.includes('연결')||h0.includes('업체')||h0.includes('ID'))?1:0;
    // 실제 시트 구조: [0]연결ID [1]업체명 [2]카테고리 [3]위치 [4]소개 [5]사진
    console.log('[광고] 행수:'+rows.length, '헤더:'+(start?'있음':'없음'));
    if(rows.length>start)console.log('[광고] 데이터1행:', JSON.stringify(rows[start]).substring(0,200));
    for(let i=start;i<rows.length;i++){
      const r=rows[i];
      const nm=String(r[1]||'').trim(); // B열=업체명
      if(!nm)continue;
      if(ADS.some(a=>a.n===nm))continue;
      const lid=parseInt(r[0])||0;       // A열=연결ID
      const catRaw=String(r[2]||'saju'); // C열=카테고리
      const cat=catRaw.includes('신점')?'sinjeom':catRaw.includes('타로')?'tarot':catRaw.includes('관상')?'gwansang':'saju';
      const rg=String(r[3]||'');         // D열=위치
      const desc=String(r[4]||'');       // E열=소개
      const img=String(r[5]||'');        // F열=사진
      ADS.push({n:nm,cat:cat,rg:rg,desc:desc,pr:'',ic:'🔮',img:img,lid:lid});
      console.log('[광고] ✅',nm,'lid:'+lid,'cat:'+cat);
    }
    console.log('[광고] 총 '+ADS.length+'개 광고');
    for(let i=ADS.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[ADS[i],ADS[j]]=[ADS[j],ADS[i]];}
    renderAdPeek();renderAdFull();
  }catch(e){console.warn('[광고]',e.message);}
}

// 광고 거리 업데이트 & 가까운순 정렬
function updateAdDist(){
  if(!myLat)return;
  ADS.forEach(ad=>{
    // 광고에 연결된 업체의 좌표로 거리 계산
    const biz=ad.lid>0?D.find(d=>d.id===ad.lid)||D.find(d=>d.n===ad.n):D.find(d=>d.n===ad.n);
    if(biz){const km=getDist(myLat,myLng,biz.lat,biz.lng);ad._dist=fmtDist(km);ad._km=km;}
    else{ad._dist='';ad._km=999;}
  });
  ADS.sort((a,b)=>(a._km||999)-(b._km||999));
  renderAdPeek();renderAdFull();
}

function renderAdPeek(){
  const ad=ADS[adIdx%ADS.length];if(!ad)return;
  const c=CT[ad.cat]||CT.saju;
  $('adPeekInner').innerHTML=`<img class="ad-peek-img" src="${ad.img}" alt="" onerror="this.style.display='none'"><div class="ad-peek-info"><div class="ad-peek-name">${ad.ic} ${ad.n} <span class="ad-badge">AD</span></div><div class="ad-peek-loc">📍 ${ad.rg}</div><div class="ad-peek-desc">${ad.desc}</div></div>`;
}

function renderAdFull(){
  $('adFull').innerHTML=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;padding-top:4px"><span style="font-size:15px;font-weight:800;color:var(--tx)">📢 신당 홍보하기</span><span style="font-size:10px;color:var(--mu)">AD · 광고</span></div>`+ADS.map((ad,i)=>{
    const c=CT[ad.cat]||CT.saju;
    return`<div class="ad-card" onclick="adClick(${i})"><img class="ad-card-img" src="${ad.img}" alt="" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2264%22 height=%2264%22><rect fill=%22%23E2E8F0%22 width=%2264%22 height=%2264%22 rx=%2210%22/><text x=%2232%22 y=%2238%22 text-anchor=%22middle%22 font-size=%2226%22>${ad.ic}</text></svg>'"><div class="ad-card-body"><div class="ad-card-name">${ad.ic} ${ad.n} <span class="ad-card-cat" style="background:${c.bg};color:${c.c}">${c.l}</span></div><div class="ad-card-loc">📍 ${ad.rg}</div><div class="ad-card-desc">${ad.desc}</div></div></div>`;
  }).join('');
}

window.toggleAd=function(){
  adOpen=!adOpen;
  $('adPanel').classList.toggle('open',adOpen);
};

window.adClick=function(idx){
  adOpen=false;$('adPanel').classList.remove('open');
  const ad=ADS[idx];
  if(!ad){toast('광고 정보 오류');return;}
  console.log('[adClick] 클릭:', ad.n, 'lid:', ad.lid, 'idx:', idx);
  console.log('[adClick] D배열 id 목록:', D.map(d=>d.id+':'+d.n).join(', '));
  // 1) 연결ID로 찾기
  if(ad.lid>0){
    const f=D.find(d=>d.id===ad.lid);
    if(f){console.log('[adClick] ✅ lid매칭:', f.n);openD(f.id);return;}
    // 숫자 타입 불일치 대비 (문자열 vs 숫자)
    const f1b=D.find(d=>String(d.id)===String(ad.lid));
    if(f1b){console.log('[adClick] ✅ lid문자열매칭:', f1b.n);openD(f1b.id);return;}
    console.log('[adClick] ⚠️ lid='+ad.lid+' 매칭 실패');
  }
  // 2) 업체명 완전일치
  const f2=D.find(d=>d.n===ad.n);
  if(f2){console.log('[adClick] ✅ 이름매칭:', f2.n);openD(f2.id);return;}
  // 3) 부분 이름 매칭
  const f3=D.find(d=>d.n.includes(ad.n)||ad.n.includes(d.n));
  if(f3){console.log('[adClick] ✅ 부분매칭:', f3.n);openD(f3.id);return;}
  console.log('[adClick] ❌ 매칭 실패. ad:', JSON.stringify(ad));
  toast('업체 상세정보를 찾을 수 없습니다');
};

// 미리보기 자동 롤링 (8초마다)
setInterval(()=>{if(!adOpen){adIdx++;renderAdPeek();}},8000);

renderAdPeek();renderAdFull();
